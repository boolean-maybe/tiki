version: "0.6.0"
description: |
  Minimal single-lane todo list. Two statuses (todo / done), two fields
  (status, priority). One lane shows all tikis: open items first by
  priority, completed items below by completion time. Use when you want
  a plain prioritized checklist and nothing else.
fields:
  - name: status
    type: enum
    values:
      - value: todo
        label: Todo
        visual: "📌"
        default: true
      - value: done
        label: Done
        visual: "✅"
  - name: priority
    type: integer
    default: 3

actions:
  - key: Ctrl-Q
    label: "Quick create"
    action: create title=input()
    input: string
    hot: false
  - key: "m"
    label: "Mark done"
    action: update where id = id() set status="done"
  - key: "M"
    label: "Mark todo"
    action: update where id = id() set status="todo"
  - key: "+"
    label: "Bump priority"
    action: update where id = id() and priority > 1 set priority = priority - 1
  - key: "-"
    label: "Lower priority"
    action: update where id = id() and priority < 5 set priority = priority + 1

views:
  - name: Todo
    kind: board
    description: "Single-lane todo list"
    default: true
    key: "F1"
    layout: |
      id + " " + <text.secondary>title + "  p" + priority
    lanes:
      - name: Tasks
        columns: 1
        width: 75
        filter: select where has(status) order by status desc, priority, updatedAt desc

triggers:
  - description: clean up completed tasks after 24 hours
    ruki: >
      every 1day
        delete where status = "done" and updatedAt < now() - 1day
