version: "0.6.1"
description: |
  Bug tracker for triaging and resolving customer-reported issues.
  Six statuses (Open → Triaged → In Progress → In Review → Verified, plus Won't Fix),
  three task types (Bug, Regression, Incident), and custom fields for severity,
  environment, reporter, foundIn version, due date, regression flag, and escalation count.
fields:
  - name: status
    type: enum
    values:
      - value: open
        label: Open
        visual: "\U0001F195"
        default: true
      - value: triaged
        label: Triaged
        visual: "\U0001F4CB"
      - value: inProgress
        label: "In Progress"
        visual: "⚙️"
      - value: inReview
        label: "In Review"
        visual: "\U0001F440"
      - value: verified
        label: Verified
        visual: "✅"
      - value: wontFix
        label: "Won't Fix"
        visual: "\U0001F6AB"
  - name: type
    type: enum
    values:
      - value: bug
        label: Bug
        visual: "\U0001F41B"
        default: true
      - value: regression
        label: Regression
        visual: "\U0001F501"
      - value: incident
        label: Incident
        visual: "\U0001F525"
  - name: severity
    type: enum
    caption: "Severity"
    values:
      - value: critical
      - value: high
      - value: medium
        default: true
      - value: low
  - name: environment
    type: enum
    caption: "Env"
    values:
      - value: prod
      - value: staging
      - value: dev
  - name: reportedBy
    type: text
    caption: "Reporter"
  - name: foundIn
    type: text
    caption: "Found in"
  - name: dueBy
    type: datetime
    caption: "Due"
  - name: regression
    type: boolean
    caption: "Regression"
    default: false
  - name: escalations
    type: integer
    caption: "Escalations"
    default: 0
  # See kanban.yaml for the rationale on declaration order: high → low so
  # ruki's < / > / order-by treat smaller rank as more urgent.
  - name: priority
    type: enum
    values:
      - {value: high, label: High, visual: "🔴"}
      - {value: medium-high, label: "Medium High", visual: "🟠"}
      - {value: medium, label: Medium, visual: "🟡", default: true}
      - {value: medium-low, label: "Medium Low", visual: "🟢"}
      - {value: low, label: Low, visual: "🔵"}
  - name: tags
    type: stringList
  - name: assignee
    type: user
  - name: dependsOn
    type: tikiIdList

actions:
  # mode: closed vocabulary view|edit|new|edit-desc — see CLAUDE.md "Detail view layout".
  - key: Enter
    label: Open
    kind: view
    view: Detail
    require: ["selection:one"]
  - key: "e"
    label: Edit
    kind: view
    view: Detail
    mode: edit
    require: ["selection:one"]
  # New is declared per-board (below), not global: creating a bug belongs on the
  # boards, not on the Docs wiki. mode:new needs no selection so the wiki
  # surfacing filter can't drop it — keeping it off Docs is a scoping choice,
  # mirroring kanban.yaml. (Open/Edit/Edit description/Edit tags are gated on
  # selection:one, so the wiki filter already drops them even while global.)
  - key: "Ctrl-D"
    label: "Edit description"
    kind: view
    view: Detail
    mode: edit-desc
    require: ["selection:one"]
  - key: "Ctrl-T"
    label: "Edit tags"
    kind: view
    view: Detail
    mode: edit
    focus: tags
    require: ["selection:one"]
  - key: "a"
    label: "Assign to me"
    action: update where id = id() set assignee=user()
  - key: "y"
    label: "Copy ID"
    action: select id where id = id() | clipboard()
  - key: "Y"
    label: "Copy content"
    action: select title, description where id = id() | clipboard()
  - key: "o"
    label: "Open in VS Code"
    action: select filepath where id = id() | run("code \"$1\"")
    hot: false
  - key: "+"
    label: "Priority up"
    action: update where id = id() set priority = prev_enum(priority)
  - key: "-"
    label: "Priority down"
    action: update where id = id() set priority = next_enum(priority)
  - key: "g"
    label: "Mark regression"
    action: update where id = id() set regression=true
  - key: "G"
    label: "Clear regression"
    action: update where id = id() set regression=false
  - key: "E"
    label: "Escalate"
    action: update where id = id() set escalations = escalations + 1
  - key: "A"
    label: "Assign to..."
    action: update where id = id() set assignee=input()
    input: string
    hot: false
  - key: "t"
    label: "Add tag"
    action: update where id = id() set tags=tags+[input()]
    input: string
    hot: false
  - key: "T"
    label: "Remove tag"
    action: update where id = id() set tags=tags-[input()]
    input: string
    hot: false
  - key: Ctrl-Q
    label: "Quick create"
    action: create title=input()
    input: string
    hot: false

views:
  - name: Triage
    kind: board
    description: "Bug triage board — move bugs through the resolution pipeline"
    default: true
    key: "F1"
    layout: |
      type.visual + " " + id
      <text.secondary>title
      "priority " + priority.visual + "  severity " + severity
    lanes:
      - name: Open
        filter: select where status = "open" and has(priority) order by priority, createdAt
        action: update where id = id() set status="open"
      - name: Triaged
        filter: select where status = "triaged" and has(priority) order by priority, createdAt
        action: update where id = id() set status="triaged"
      - name: In Progress
        filter: select where status = "inProgress" and has(priority) order by priority, createdAt
        action: update where id = id() set status="inProgress"
      - name: In Review
        filter: select where status = "inReview" and has(priority) order by priority, createdAt
        action: update where id = id() set status="inReview"
      - name: Verified
        filter: select where status = "verified" and has(priority) order by priority, createdAt
        action: update where id = id() set status="verified"
    actions:
      - key: "n"
        label: New
        kind: view
        view: Detail
        mode: new
      - key: "w"
        label: "Won't fix"
        action: update where id = id() set status="wontFix"

  - name: Severity
    kind: board
    description: "Bugs grouped by severity level"
    key: "F2"
    layout: |
      type.visual + " " + id
      <text.secondary>title
      "priority " + priority.visual + "  severity " + severity
    lanes:
      - name: Critical
        columns: 2
        width: 40
        filter: select where severity = "critical" and status != "verified" and status != "wontFix" and has(priority) order by priority, createdAt
        action: update where id = id() set severity="critical"
      - name: High
        filter: select where severity = "high" and status != "verified" and status != "wontFix" and has(priority) order by priority, createdAt
        action: update where id = id() set severity="high"
      - name: Medium
        filter: select where severity = "medium" and status != "verified" and status != "wontFix" and has(priority) order by priority, createdAt
        action: update where id = id() set severity="medium"
      - name: Low
        filter: select where severity = "low" and status != "verified" and status != "wontFix" and has(priority) order by priority, createdAt
        action: update where id = id() set severity="low"
    actions:
      - key: "n"
        label: New
        kind: view
        view: Detail
        mode: new
      - key: "c"
        label: "Clear severity"
        action: update where id = id() set severity=empty

  - name: Environments
    kind: board
    description: "Bugs grouped by environment — prod, staging, dev"
    key: "F3"
    layout: |
      type.visual + " " + id
      <text.secondary>title
      "priority " + priority.visual + "  severity " + severity
    lanes:
      - name: Prod
        columns: 1
        filter: select where environment = "prod" and status != "verified" and status != "wontFix" and has(priority) order by priority, createdAt
        action: update where id = id() set environment="prod"
      - name: Staging
        columns: 1
        filter: select where environment = "staging" and status != "verified" and status != "wontFix" and has(priority) order by priority, createdAt
        action: update where id = id() set environment="staging"
      - name: Dev
        columns: 1
        filter: select where environment = "dev" and status != "verified" and status != "wontFix" and has(priority) order by priority, createdAt
        action: update where id = id() set environment="dev"
      - name: Unspecified
        columns: 1
        filter: select where environment is empty and status != "verified" and status != "wontFix" and has(priority) order by priority, createdAt
    actions:
      - key: "n"
        label: New
        kind: view
        view: Detail
        mode: new

  - name: SLA Watch
    kind: board
    description: "Deadline tracking — overdue, due today, this week, and unscheduled"
    key: "F4"
    layout: |
      type.visual + " " + id
      <text.secondary>title
      "priority " + priority.visual + "  severity " + severity
    lanes:
      - name: Overdue
        filter: select where has(dueBy) and dueBy < now() and status != "verified" and status != "wontFix" order by dueBy
      - name: Due Today
        filter: select where has(dueBy) and dueBy >= now() and dueBy < now() + 1day and has(priority) order by priority
      - name: This Week
        filter: select where has(dueBy) and dueBy >= now() + 1day and dueBy < now() + 7day order by dueBy
      - name: No SLA
        filter: select where not has(dueBy) and status != "verified" and status != "wontFix" and has(priority) order by priority
    actions:
      - key: "n"
        label: New
        kind: view
        view: Detail
        mode: new
      - key: "d"
        label: "Clear deadline"
        action: update where id = id() set dueBy=empty
      - key: "D"
        label: "Bump one week"
        action: update where id = id() set dueBy=now() + 7day

  - name: Docs
    kind: wiki
    description: "Project notes and documentation files"
    path: "index.md"
    key: "F5"

  - name: Detail
    kind: detail
    description: "Configured detail view for the selected bug"
    require: ["selection:one"]
    # 8-column grid mirrors kanban's Detail. Tags span the right column from
    # row 3 through row 7. See CLAUDE.md "Detail view layout" for cell vocabulary.
    layout: |
      <highlight>title | --                                 | --           | --          | --              | --           | --      | --
      _                | _                                  | _            | _           | _               | _            | _       | _
      <text.label>status.caption     | status.label + " " + status.visual | <text.label>severity.caption    | severity    | <text.label>reportedBy.caption | reportedBy   | <text.label>tags.caption | tags
      <text.label>type.caption       | type.label + " " + type.visual     | <text.label>environment.caption | environment | <text.label>foundIn.caption    | foundIn      | ^                        | ^
      <text.label>priority.caption   | priority                           | <text.label>dueBy.caption       | dueBy       | <text.label>regression.caption | regression   | ^                        | ^
      <text.muted>createdBy.caption  | createdBy                          | <text.muted>createdAt.caption   | createdAt   | <text.label>escalations.caption | escalations | ^                        | ^
      <text.label>assignee.caption   | assignee                           | <text.muted>updatedAt.caption   | updatedAt   | _                              | _            | ^                        | ^

triggers:
  - description: critical bugs must specify environment
    ruki: >
      before create
        where new.severity = "critical" and new.environment is empty
        deny "critical bugs require environment"
  - description: bugs must pass through review before verification
    ruki: >
      before update
        where new.status = "verified" and old.status != "inReview"
        deny "bugs must pass through review before verification"
  - description: per-assignee WIP limit of 3 in-progress bugs
    ruki: >
      before update
        where new.status = "inProgress" and new.assignee is not empty
          and count(select where assignee = new.assignee and status = "inProgress") > 2
        deny "assignee already at WIP limit (3 in-progress bugs)"
  - description: cannot delete an active bug
    ruki: >
      before delete
        where old.status = "inProgress" or old.status = "inReview"
        deny "cannot delete an active bug — move to wontFix or verified first"
  - description: auto-prioritize critical bugs and set 24h SLA
    ruki: >
      after create
        where new.severity = "critical"
        update where id = new.id set priority="high" dueBy=now() + 1day
  - description: tag and bump priority when regression is flagged
    ruki: >
      after update
        where new.regression = true and old.regression != true
        update where id = new.id set tags=tags + ["regression"] priority="high"
  - description: clear SLA on closure
    ruki: >
      after update
        where new.status = "verified" or new.status = "wontFix"
        update where id = new.id set dueBy=empty
  - description: remove deleted task from dependency lists
    ruki: >
      after delete
        update where old.id in dependsOn set dependsOn = dependsOn - [old.id]
  - description: auto-escalate overdue critical bugs every hour
    ruki: >
      every 1hour
        update where severity = "critical" and has(dueBy) and dueBy < now() and status != "verified" and status != "wontFix"
          set escalations = escalations + 1
  - description: purge closed bugs older than 30 days
    ruki: >
      every 1day
        delete where (status = "verified" or status = "wontFix") and updatedAt < now() - 30day
  - description: demote stale in-progress bugs back to triaged
    ruki: >
      every 1day
        update where status = "inProgress" and updatedAt < now() - 7day
          set status="triaged"
