version: "0.6.0"
description: |
  Kanban-style workflow for small-team software work. Five statuses
  (Backlog → Ready → In Progress → Review → Done) and four task types
  (Story, Bug, Spike, Epic). Includes an "assign to me" action.
fields:
  - name: status
    type: enum
    values:
      - value: backlog
        label: Backlog
        visual: "📥"
        default: true
      - value: ready
        label: Ready
        visual: "📋"
      - value: inProgress
        label: "In Progress"
        visual: "⚙️"
      - value: review
        label: Review
        visual: "👀"
      - value: done
        label: Done
        visual: "✅"
  - name: type
    type: enum
    values:
      - value: story
        label: Story
        visual: "🌀"
        default: true
      - value: bug
        label: Bug
        visual: "💥"
      - value: spike
        label: Spike
        visual: "🔍"
      - value: epic
        label: Epic
        visual: "🗂️"
  # priority is declared in urgency-descending order (high → low). The
  # high-to-low ordering matters: ruki's `<` / `>` use enumRank, so
  # `priority < "medium"` finds tasks more urgent than medium. The
  # `+`/`-` actions step through this list via prev_enum/next_enum
  # (prev raises urgency, next lowers it).
  - name: priority
    type: enum
    values:
      - {value: high, label: High, visual: "🔴"}
      - {value: medium-high, label: "Medium High", visual: "🟠"}
      - {value: medium, label: Medium, visual: "🟡", default: true}
      - {value: medium-low, label: "Medium Low", visual: "🟢"}
      - {value: low, label: Low, visual: "🔵"}
  # points: enum declared high → low so enumRank matches priority semantics.
  # The visual: column draws an 11-segment bar using the <action>/<muted>
  # role markup; the bar is purely a rendering hint, not stored on disk.
  - name: points
    type: enum
    values:
      - {value: "11", label: "11", visual: "<action>❚❚❚❚❚❚❚❚❚❚❚"}
      - {value: "7",  label: "7",  visual: "<action>❚❚❚❚❚❚❚<muted>❘❘❘❘"}
      - {value: "3",  label: "3",  visual: "<action>❚❚❚<muted>❘❘❘❘❘❘❘❘", default: true}
      - {value: "1",  label: "1",  visual: "<action>❚<muted>❘❘❘❘❘❘❘❘❘❘"}
  - name: tags
    type: stringList
    default: ["idea"]
  - name: dependsOn
    type: tikiIdList
  - name: due
    type: date
  - name: recurrence
    type: recurrence
  - name: assignee
    type: text

actions:
  - key: Enter
    label: Open
    kind: view
    view: Detail
    require: ["selection:one"]
  - key: "a"
    label: "Assign to me"
    action: update where id = id() set assignee=user()
  - key: "y"
    label: "Copy ID"
    action: select id where id = id() | clipboard()
  - key: "Y"
    label: "Copy content"
    action: select title, description where id = id() | clipboard()
  - key: "o"
    label: "Open in VS Code"
    action: select filepath where id = id() | run("code \"$1\"")
    hot: false
  - key: "+"
    label: "Priority up"
    action: update where id = id() set priority = prev_enum(priority)
  - key: "-"
    label: "Priority down"
    action: update where id = id() set priority = next_enum(priority)
  - key: "u"
    label: "Flag urgent"
    action: update where id = id() set priority="high" tags=tags+["urgent"]
    hot: false
  - key: "A"
    label: "Assign to..."
    action: update where id = id() set assignee=input()
    input: string
    hot: false
  - key: "t"
    label: "Add tag"
    action: update where id = id() set tags=tags+[input()]
    input: string
    hot: false
  - key: "T"
    label: "Remove tag"
    action: update where id = id() set tags=tags-[input()]
    input: string
    hot: false
  - key: Ctrl-Q
    label: "Quick create"
    action: create title=input()
    input: string
    hot: false

views:
  - name: Kanban
    kind: board
    description: "Move tiki to change status, search, create or delete\nShift Left/Right to move"
    default: true
    key: "F1"
    lanes:
      - name: Ready
        filter: select where status = "ready" and type != "epic" and has(priority) order by priority, createdAt
        action: update where id = id() set status="ready"
      - name: In Progress
        filter: select where status = "inProgress" and type != "epic" and has(priority) order by priority, createdAt
        action: update where id = id() set status="inProgress"
      - name: Review
        filter: select where status = "review" and type != "epic" and has(priority) order by priority, createdAt
        action: update where id = id() set status="review"
      - name: Done
        filter: select where status = "done" and type != "epic" and has(priority) order by priority, createdAt
        action: update where id = id() set status="done"

  - name: Backlog
    kind: board
    description: "Tasks waiting to be picked up, sorted by priority"
    key: "F3"
    lanes:
      - name: Backlog
        columns: 4
        filter: select where status = "backlog" and type != "epic" and has(priority) order by priority, id
    actions:
      - key: "b"
        label: "Add to board"
        action: update where id = id() set status="ready"
      - key: "e"
        label: "Link to epic"
        action: update where id = choose(select where type = "epic" and outer.id not in dependsOn) set dependsOn = dependsOn + id()

  - name: Recent
    kind: board
    description: "Tasks changed in the last 24 hours, most recent first"
    key: Ctrl-R
    lanes:
      - name: Recent
        columns: 4
        filter: select where now() - updatedAt < 24hour order by updatedAt desc

  - name: Roadmap
    kind: board
    description: "Epics organized by Now, Next, and Later horizons"
    key: "F4"
    mode: expanded
    lanes:
      - name: Now
        columns: 1
        width: 25
        filter: select where type = "epic" and status = "ready" and has(priority) and has(points) order by priority, points
        action: update where id = id() set status="ready"
      - name: Next
        columns: 1
        width: 25
        filter: select where type = "epic" and status = "backlog" and has(priority) and priority = "high" and has(points) order by priority, points
        action: update where id = id() set status="backlog" priority="high"
      - name: Later
        columns: 2
        width: 50
        filter: select where type = "epic" and status = "backlog" and has(priority) and priority > "high" and has(points) order by priority, points
        action: update where id = id() set status="backlog" priority="medium-high"
    actions:
      - key: Enter
        label: Open
        kind: view
        view: EpicDetail
        require: ["selection:one"]
      - key: "l"
        label: "Add tiki to epic"
        action: update where id = id() set dependsOn = dependsOn + choose(select where type != "epic" and id not in outer.dependsOn)

  - name: Docs
    kind: wiki
    description: "Project notes and documentation files"
    path: "index.md"
    key: "F2"

  - name: Detail
    kind: detail
    description: "Configured detail view for the selected tiki"
    require: ["selection:one"]
    # Metadata grid: each row is a row in the rendered metadata box. Cells:
    #   name          field, value-only (no caption)
    #   name:N        field, preferred + minimum width of N chars
    #   <role>name    field with a color role (highlight, accent, muted, etc.)
    #   "any text"    literal caption (any quoted YAML string that is not a
    #                 bare identifier or marker)
    #   --            column span (continue from the cell to the left)
    #   ^             row span (continue from the cell above); `|` also
    #                 accepted but must be YAML-quoted
    #   _             empty cell
    #   <->           horizontal stretcher (absorbs remaining space)
    #
    # Fields render value-only; captions are placed explicitly by the layout.
    # 4 columns: each row pairs (caption, value, caption, value). Captions
    # to the left of their fields. Sized to fit an 80-column terminal.
    metadata:
      - [<highlight>title, --                                , --         , --       , --           , --        , --     , --  ]
      - [_               , _                                 , _          , _        , _            , _         , _      , _   ]
      - ["Status:"       , status.label + " " + status.visual, "Assignee:", assignee , "Due:"       , due       , "Tags:", tags]
      - ["Type:"         , type.label + " " + type.visual    , "Author:"  , createdBy, "Recurrence:", recurrence, ^      , ^   ]
      - ["Priority:"     , priority                          , "Created:" , createdAt, _            , _         , ^      , ^   ]
      - ["Points:"       , points                            , "Updated:" , updatedAt, _            , _         , ^      , ^   ]

  - name: EpicDetail
    kind: detail
    description: "Configured detail view for an epic"
    require: ["selection:one"]
    # Same 8-column grid as Detail, with type, assignee, and recurrence
    # fields removed. Tags still spans rows 3-5 in the right column.
    metadata:
      - [<highlight>title, --                                , --        , --       , --    , --, --     , --  ]
      - [_               , _                                 , _         , _        , _     , _ , _      , _   ]
      - ["Status:"       , status.label + " " + status.visual, "Author:" , createdBy, "Due:", due, "Tags:", tags]
      - ["Priority:"     , priority                          , "Created:", createdAt, _     , _ , ^      , ^   ]
      - ["Points:"       , points                            , "Updated:", updatedAt, _     , _ , ^      , ^   ]

triggers:
  - description: block completion with open dependencies
    ruki: >
      before update
        where new.status = "done" and new.dependsOn any status != "done"
        deny "cannot complete: has open dependencies"
  - description: tasks must pass through review before completion
    ruki: >
      before update
        where new.status = "done" and old.status != "review"
        deny "tasks must go through review before marking done"
  - description: remove deleted task from dependency lists
    ruki: >
      after delete
        update where old.id in dependsOn set dependsOn = dependsOn - [old.id]
  - description: clean up completed tasks after 24 hours
    ruki: >
      every 1day
        delete where status = "done" and updatedAt < now() - 1day
  - description: tasks must have an assignee before starting
    ruki: >
      before update
        where new.status = "inProgress" and new.assignee is empty
        deny "assign someone before moving to in-progress"
  - description: auto-complete epics when all child tasks finish
    ruki: >
      after update
        where new.status = "done" and new.type != "epic"
        update where type = "epic" and new.id in dependsOn and dependsOn all status = "done"
        set status="done"
  - description: cannot delete tasks that are actively being worked
    ruki: >
      before delete
        where old.status = "inProgress"
        deny "cannot delete an in-progress task — move to backlog or done first"
  - description: spawn next occurrence when recurring task completes
    ruki: >
      after update
        where new.status = "done" and old.recurrence is not empty
        create title=old.title priority=old.priority tags=old.tags
               recurrence=old.recurrence due=next_date(old.recurrence) status="backlog"
