  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

37,.20), transparent 55%),\n      radial-gradient(ellipse 1000px 600px at 0% 40%, rgba(125,142,164,.12), transparent 60%),\n      radial-gradient(ellipse 900px 600px at 50% 100%, rgba(75,163,255,.08), transparent 60%),\n      linear-gradient(to bottom, #0d1626 0%, #0a111e 700px, #060912 100%),\n      var(--bg);\n    color: var(--fg);\n    font-size: 15px;\n    line-height: 1.6;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n  }\n  ::selection { background: rgba(75,163,255,.30); color: var(--fg); }\n  a { color: var(--yellow); text-decoration: none; border-bottom: 1px dotted rgba(232,184,90,.4); }\n  a:hover { color: var(--fg); border-bottom-color: var(--fg); }\n\n  /* === topbar === */\n  .topbar {\n    position: sticky; top: 0; z-index: 50;\n    backdrop-filter: blur(10px);\n    background: color-mix(in oklch, var(--bg) 90%, transparent);\n    border-bottom: 1px solid var(--line-soft);\n  }\n  .topbar-in {\n    max-width: 1380px; margin: 0 auto;\n    padding: 14px 36px;\n    display: flex; gap: 28px; align-items: center;\n  }\n  .brand {\n    display: inline-flex; align-items: baseline; gap: 10px;\n    color: var(--fg); font-weight: 700;\n    border: 0;\n  }\n  .brand .mark {\n    display: inline-block; width: 22px; height: 22px;\n    border: 1.5px solid var(--yellow); color: var(--yellow);\n    text-align: center; line-height: 19px;\n    font-size: 12px; font-weight: 700;\n  }\n  .brand .ver { color: var(--fg-faint); font-size: 12px; font-weight: 500; margin-left: 2px; }\n  .topnav { margin-left: auto; display: flex; gap: 24px; align-items: center; }\n  .topnav a {\n    color: var(--fg-dim); font-size: 13px;\n    border: 0;\n  }\n  .topnav a:hover { color: var(--fg); }\n  .topnav .gh {\n    display: inline-flex; align-items: center; gap: 8px;\n    padding: 6px 12px;\n    border: 1px solid var(--line);\n    color: var(--fg);\n  }\n  .topnav .gh:hover { border-color: var(--yellow); color: var(--yellow); }\n\n  /* === wrap === */\n  .wrap { max-width: 1380px; margin: 0 auto; padding: 0 36px; }\n\n  /* === HERO === */\n  .hero { padding: 36px 0 56px; }\n  .hero-grid {\n    display: grid;\n    grid-template-columns: minmax(0, 360px) minmax(0, 1fr);\n    gap: 56px;\n    align-items: start;\n  }\n  @media (max-width: 1080px) {\n    .hero-grid { grid-template-columns: 1fr; gap: 32px; }\n  }\n\n  .kicker {\n    color: var(--gold);\n    font-size: 11px;\n    letter-spacing: .18em;\n    text-transform: uppercase;\n    font-weight: 700;\n    margin-bottom: 16px;\n    display: inline-flex; align-items: center; gap: 12px;\n  }\n  .kicker::before {\n    content: \"\"; display: inline-block;\n    width: 24px; height: 1px; background: var(--gold);\n  }\n\n  .hero h1 {\n    margin: 0;\n    font-size: clamp(34px, 3.6vw, 48px);\n    line-height: 1.05;\n    font-weight: 700;\n    letter-spacing: -0.025em;\n    color: var(--fg);\n  }\n  .hero h1 .em { color: var(--yellow); }\n  .hero .tagline {\n    margin-top: 20px;\n    font-size: 15.5px;\n    line-height: 1.65;\n    color: var(--fg-dim);\n    max-width: 460px;\n  }\n  .hero .tagline strong { color: var(--fg); font-weight: 500; }\n\n  .hero .install {\n    margin-top: 26px;\n    display: inline-flex; align-items: center; gap: 14px;\n    padding: 12px 16px;\n    background: var(--bg-elev);\n    border: 1px solid var(--line);\n    color: var(--fg); font-size: 14px;\n    width: 100%;\n    max-width: 360px;\n  }\n  .hero .install .p { color: var(--green); user-select: none; }\n  .hero .install .cmd { color: var(--fg); flex: 1; }\n  .hero .install button {\n    background: transparent; border: 1px solid var(--line);\n    color: var(--fg-dim);\n    font-family: inherit; font-size: 11px;\n    padding: 4px 10px; cursor: pointer; letter-spacing: .04em;\n  }\n  .hero .install button:hover { color: var(--yellow); border-color: var(--yellow); }\n  .hero .install button.copied { color: var(--green); border-color: var(--green); }\n\n  .hero .ctas { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }\n  .btn {\n    display: inline-flex; align-items: center; gap: 8px;\n    padding: 11px 18px;\n    font-size: 13px; font-weight: 500;\n    border: 1px solid var(--line);\n    color: var(--fg);\n    background: transparent;\n  }\n  .btn.primary { background: var(--yellow); color: var(--bg); border-color: var(--yellow); }\n  .btn.primary:hover { background: color-mix(in oklch, var(--yellow) 85%, white); }\n  .btn:hover { border-color: var(--yellow); color: var(--yellow); }\n  .btn.primary:hover { color: var(--bg); }\n\n  .hero .meta {\n    margin-top: 28px;\n    color: var(--fg-faint); font-size: 12px;\n    letter-spacing: .03em;\n    display: flex; gap: 20px; flex-wrap: wrap;\n  }\n  .hero .meta .dot {\n    width: 6px; height: 6px; border-radius: 50%;\n    background: var(--green); display: inline-block;\n    margin-right: 8px; vertical-align: middle;\n  }\n  .hero .meta b { color: var(--fg-dim); font-weight: 600; }\n\n  /* === Hero TUI wrapper with perspective === */\n  .tui-wrap {\n    perspective: 1800px;\n    perspective-origin: 50% 30%;\n    position: relative;\n  }\n\n  /* === The TUI hero (with tabs) === */\n  .tui {\n    background: var(--bg-elev);\n    border: 1px solid var(--line);\n    border-radius: 10px;\n    overflow: hidden;\n    position: relative;\n    transform: rotateY(-5deg) rotateX(2deg);\n    transform-origin: 50% 50%;\n    transform-style: preserve-3d;\n    box-shadow:\n      0 1px 0 rgba(255,255,255,.06) inset,\n      -38px 80px 140px -40px rgba(0,0,0,.9),\n      -20px 60px 120px -20px rgba(107,159,237,.40),\n      14px 50px 100px -30px rgba(125,142,164,.18),\n      0 32px 80px -20px rgba(0,0,0,.7);\n    transition:\n      transform .22s cubic-bezier(.2,.7,.2,1),\n      box-shadow .35s ease;\n    will-change: transform;\n  }\n  /* shine that tracks the cursor */\n  .tui::before {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background: radial-gradient(\n      circle 320px at var(--mx, kground: var(--bg-elev);\n  }\n  .tui-tab.active .key { opacity: 1; color: var(--amber); }\n\n  /* auto-play progress indicator under the active rail item */\n  .tui-tab::after {\n    content: \"\";\n    position: absolute;\n    left: 8px; right: 8px; bottom: 4px;\n    height: 1.5px;\n    background: var(--amber);\n    transform-origin: left center;\n    transform: scaleX(0);\n    opacity: 0;\n    pointer-events: none;\n  }\n  .tui-tab.ticking::after {\n    opacity: .85;\n    animation: tui-tick 4.2s linear forwards;\n  }\n  @keyframes tui-tick {\n    from { transform: scaleX(0); }\n    to   { transform: scaleX(1); }\n  }\n\n  /* tab content frame */\n  .tui-body {\n    background: var(--bg-elev);\n    flex: 1;\n    min-width: 0;\n    min-height: 520px;\n    max-height: 620px;\n    overflow-y: auto;\n    padding: 18px 22px 12px;\n    position: relative;\n  }\n  .tui-body::-webkit-scrollbar { width: 8px; }\n  .tui-body::-webkit-scrollbar-track { background: var(--bg-strip); }\n  .tui-body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }\n  .tui-body::-webkit-scrollbar-thumb:hover { background: var(--fg-faint); }\n  .tui-view { display: none; }\n  .tui-view.active { display: block; }\n\n  /* TUI footer */\n  .tui-foot {\n    background: var(--bg-card);\n    border-top: 1px solid var(--line);\n    padding: 4px 14px;\n    display: flex; gap: 10px; align-items: center;\n    font-size: 11px; color: var(--fg-dim);\n  }\n  .tui-foot .pill {\n    background: var(--bg-strip);\n    color: var(--yellow);\n    padding: 1px 8px;\n  }\n  .tui-foot .seg { color: var(--blue); }\n  .tui-foot .right { margin-left: auto; color: var(--fg-faint); }\n\n  /* === KANBAN view === */\n  .kb-head {\n    display: grid;\n    grid-template-columns: 1fr auto;\n    gap: 20px;\n    padding-bottom: 12px;\n    border-bottom: 1px solid var(--line-soft);\n    margin-bottom: 12px;\n  }\n  .kb-head .keybinds {\n    display: grid;\n    grid-template-columns: repeat(4, auto);\n    g viewer .image.schematic::after {\n    content: \"▢ actuator-block-diagram.png · 1240×580 · inline (kitty)\";\n    bottom: 8px;\n  }\n\n  /* second image — \"telemetry trace\" / waveform */\n  .viewer .image.trace {\n    background:\n      linear-gradient(to bottom, transparent 49.6%, rgba(125,166,224,.18) 49.6%, rgba(125,166,224,.18) 50.4%, transparent 50.4%),\n      linear-gradient(rgba(92,196,214,.06) 1px, transparent 1px) 0 0 / 100% 18px,\n      var(--bg-strip);\n    height: 120px;\n    padding: 0;\n    position: relative;\n  }\n  .viewer .image.trace .label { display: none; }\n  .viewer .image.trace svg {\n    position: absolute; inset: 0; width: 100%; height: 100%;\n  }\n  .viewer .image.trace::after {\n    content: \"▢ telemetry-trace.svg · last 60s\";\n    bottom: 6px;\n  }\n\n  /* sequence diagram */\n  .viewer .seq {\n    border: 1px solid var(--line);\n    background: var(--bg-card);\n    padding: 14px 16px;\n    margin: 12px 0;\n  }\n  .viewer .seq .label {\n    color: var(--yellow); font-size: 11px;\n    letter-spacing: .12em; text-transform: uppercase;\n    font-weight: 700;\n    margin-bottom: 10px;\n  }\n  .viewer .seq-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr 1fr;\n    gap: 0;\n    position: relative;\n  }\n  .viewer .seq-grid .actor {\n    text-align: center;\n    color: var(--fg);\n    font-size: 11.5px;\n    font-weight: 600;\n    padding: 4px 0 10px;\n    border-bottom: 1px dashed var(--line);\n    position: relative;\n  }\n  .viewer .seq-grid .actor::after {\n    content: \"\";\n    position: absolute;\n    top: 100%; left: 50%;\n    width: 1px; height: 84px;\n    background: var(--line);\n  }\n  .viewer .seq-msg {\n    grid-column: 1 / -1;\n    display: grid;\n    grid-template-columns: 1fr 1fr 1fr;\n    align-items: center;\n    margin-top: 8px;\n    font-size: 11px;\n    color: var(--fg-dim);\n  }\n  .viewer .seq-msg .arr {\n    grid-column: 1 / 3;\n    height: 1px; background: var(--teal);\n    position: relative;\n    margin: 0 12px;\n  }\n  .viewer .seq-msg .arr::after {\n    content: \"▶\"; color: var(--teal);\n    position: absolute; right: -4px; top: -8px;\n    font-size: 12px;\n  }\n  .viewer .seq-msg .arr.back {\n    grid-column: 2 / 4;\n    background: var(--terra);\n  }\n  .viewer .seq-msg .arr.back::after {\n    content: \"◀\"; color: var(--terra);\n    right: auto; left: -4px;\n  }\n  .viewer .seq-msg .lbl {\n    grid-column: 1 / -1;\n    color: var(--fg-dim);\n    font-size: 10.5px;\n    text-align: center;\n    margin-top: 4px;\n  }\n\n  /* code block in markdown */\n  .viewer .code-block {\n    background: var(--bg-strip);\n    border: 1px solid var(--line);\n    padding: 10px 14px;\n    margin: 10px 0;\n    font-size: 12px;\n    line-height: 1.6;\n    color: var(--fg);\n    white-space: pre;\n    overflow-x: auto;\n  }\n  .viewer .code-block .lang {\n    color: var(--fg-faint); font-size: 10px;\n    letter-spacing: .12em; text-transform: uppercase;\n    display: block; margin-bottom: 6px;\n  }\n\n  /* === SVG diagrams (mermaid-style sequence + flowchart) === */\n  .diag-card {\n    border: 1px solid var(--line);\n    background: var(--bg-card);\n    padding: 14px 18px 16px;\n    margin: 10px 0;\n  }\n  .diag-card .diag-label {\n    color: var(--yellow);\n    font-size: 11px;\n    letter-spacing: .14em;\n    text-transform: uppercase;\n    font-weight: 700;\n    margin-bottom: 10px;\n  }\n  .diag-svg {\n    display: block;\n    width: 100%;\n    max-width: 480px;\n    height: auto;\n    margin: 0 auto;\n    font-family: \"JetBrains Mono\", ui-monospace, monospace;\n  }\n  .diag-svg text { font-family: inherit; }\n  .diag-card { padding: 12px 14px 14px; }\n  .diag-card .diag-label { font-size: 10px; margin-bottom: 8px; }\n\n  /* richer mermaid flowchart */\n  .viewer .mermaid.big { padding: 18px; }\n  .viewer .mermaid.big .row.tall { gap: 20px; flex-wrap: wrap; justify-content: center; }\n  .viewer .mermaid.big .node.diamond {\n    transform: skewX(-12deg);\n    padding: 6px 14px;\n  }\n  .viewer .mermaid.big .node.diamond span { display: inline-block; transform: skewX(12deg); }\n\n  .viewer .mermaid-tree {\n    display: grid;\n    grid-template-rows: auto 20px auto;\n    gap: 0;\n    justify-items: center;\n    align-items: center;\n    margin-top: 8px;\n  }\n  .viewer .mermaid-tree .down {\n    width: 1px; height: 20px; background: var(--fg-dim);\n  }\n  .viewer .mermaid-tree .branch {\n    display: flex; gap: 28px; align-items: center;\n  }\n\n  /* mermaid in viewer */\n  .viewer .mermaid {\n    border: 1px solid var(--line);\n    background: var(--bg-card);\n    padding: 14px 16px;\n    margin: 12px 0;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 10px;\n  }\n  .viewer .mermaid .label {\n    color: var(--yellow); font-size: 11px;\n    letter-spacing: .12em; text-transform: uppercase;\n    font-weight: 700;\n    margin-bottom: 2px;\n  }\n  .viewer .mermaid .row { display: flex; gap: 14px; align-items: center; }\n  .viewer .mermaid .node {\n    padding: 6px 14px;\n    border: 1.5px solid;\n    background: var(--bg-elev);\n    font-size: 12px;\n    font-weight: 500;\n    color: var(--fg);\n  }\n  .viewer .mermaid .node.a { border-color: var(--blue); }\n  .viewer .mermaid .node.b { border-color: var(--green); }\n  .viewer .mermaid .node.c { border-color: var(--terra); }\n  .viewer .mermaid .arr { color: var(--fg-dim); font-size: 14px; }\n\n  .viewer .toc {\n    position: absolute; top: 18px; right: 22px;\n    background: var(--bg-card);\n    border: 1px solid var(--line);\n    padding: 10px 14px;\n    font-size: 11px;\n    color: var(--fg-dim);\n    line-height: 1.7;\n    max-width: 200px;\n  }\n  .viewer .toc .h { color: var(--terra); font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }\n  .viewer .toc .item { color: var(--blue); cursor: pointer; }\n  .viewer .toc .item:hover { color: var(--fg); }\n  .viewer .toc .item.active { color: var(--yellow); }\n  @media (max-width: 760px) { .viewer .toc { display: none; } }\n\n  /* === RUKI view === */\n  .ruki-view {\n    color: var(--fg);\n    font-size: 13.5px;\n    line-height: 1.65;\n  }\n  .ruki-view .top {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 18px;\n    margin-bottom: 14px;\n  }\n  @media (max-width: 760px) { .ruki-view .top { grid-template-columns: 1fr; } }\n  .ruki-view .panel {\n    background: var(--bg-card);\n    border: 1px solid var(--line);\n    padding: 12px 14px;\n  }\n  .ruki-view .panel .label {\n    color: var(--gold); font-size: 10.5px;\n    letter-spacing: .14em; text-transform: uppercase;\n    font-weight: 700; margin-bottom: 8px;\n  }\n  .ruki-view .panel pre {\n    margin: 0; font-size: 12.5px; line-height: 1.7;\n    white-space: pre; overflow-x: auto;\n    color: var(--fg);\n    font-family: inherit;\n  }\n  .ruki-view .res .row {\n    display: grid; grid-template-columns: auto auto 1fr;\n    gap: 12px; padding: 3px 0;\n    font-size: 12.5px;\n  }\n  .ruki-view .res .id { color: var(--blue); font-weight: 600; }\n  .ruki-view .res .icon { font-size: 11px; }\n  .ruki-view .res .icon.bug { color: var(--red); }\n  .ruki-view .res .icon.task { color: var(--green); }\n  .ruki-view .res .icon.research { color: var(--blue); }\n  .ruki-view .res .icon.spike { color: var(--yellow); }\n  .ruki-view .res .title { color: var(--fg); }\n  .ruki-view .res .meta { color: var(--fg-faint); margin-top: 8px; font-size: 11px; padding-top: 8px; border-top: 1px dashed var(--line); }\n\n  /* === WORKFLOW.YAML view === */\n  .wf-view {\n    display: grid;\n    grid-template-columns: 1.5fr 1fr;\n    gap: 18px;\n  }\n  @media (max-width: 760px) { .wf-view { grid-template-columns: 1fr; } }\n  .wf-view .code-panel {\n    background: var(--bg-card);\n    border: 1px solid var(--line);\n    padding: 12px 14px;\n    max-height: 440px;\n    overflow-y: auto;\n  }\n  .wf-view .code-panel pre {\n    margin: 0; font-size: 12px; line-height: 1.65;\n    color: var(--fg); font-family: inherit;\n    white-space: pre;\n  }\n  .wf-view .legend {\n    display: flex; flex-direction: column; gap: 12px;\n  }\n  .wf-view .legend .item {\n    border: 1px solid var(--line);\n    background: var(--bg-card);\n    padding: 12px 14px;\n  }\n  .wf-view .legend .item .h {\n    color: var(--yellow); font-size: 12px;\n    letter-spacing: .12em; text-transform: uppercase;\n    font-weight: 700; margin-bottom: 4px;\n  }\n  .wf-view .legend .item p {\n    margin: 0; color: var(--fg-dim); font-size: 12px; line-height: 1.55;\n  }\n  .wf-view .legend .item p code { color: var(--fg); }\n\n  /* syntax tokens */\n  .t-kw    { color: var(--terra); font-weight: 600; }\n  .t-fn    { color: var(--teal); }\n  .t-str   { color: var(--olive); }\n  .t-num   { color: var(--yellow); }\n  .t-cm    { color: var(--fg-faint); font-style: italic; }\n  .t-prop  { color: var(--gold); }\n  .t-id    { color: var(--blue); font-weight: 500; }\n  .t-h     { color: var(--yellow); font-weight: 700; }\n\n  /* ================= SECTIONS ================= */\n  section.below {\n    padding: 80px 0;\n    border-top: 1px solid var(--line-soft);\n  }\n  .sec-head { margin-bottom: 36px; max-width: 720px; }\n  .sec-head .lbl {\n    color: var(--gold);\n    font-size: 12px;\n    letter-spacing: .18em;\n    text-transform: uppercase;\n    font-weight: 700;\n    margin-bottom: 12px;\n    display: inline-flex; align-items: center; gap: 12px;\n  }\n  .sec-head .lbl::before {\n    content: \"\"; display: inline-block;\n    width: 24px; height: 1px; background: var(--gold);\n  }\n  .sec-head h2 {\n    margin: 0 0 12px;\n    font-size: clamp(26px, 3vw, 36px);\n    line-height: 1.15;\n    letter-spacing: -0.02em;\n    color: var(--fg);\n  }\n  .sec-head h2 .em { color: var(--yellow); }\n  .sec-head p {\n    margin: 0; color: var(--fg-dim); font-size: 15px; line-height: 1.65;\n  }\n  .sec-head p strong { color: var(--fg); font-weight: 500; }\n\n  /* === Why pillars === */\n  .pillars3 {\n    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;\n  }\n  @media (max-width: 880px) { .pillars3 { grid-template-columns: 1fr; } }\n  .pillar {\n    border: 1px solid var(--line); padding: 24px 24px 26px;\n    background: var(--bg-elev);\n  }\n  .pillar .num {\n    color: var(--yellow); font-size: 12px; font-weight: 700;\n    letter-spacing: .12em; margin-bottom: 8px;\n  }\n  .pillar h3 { margin: 0 0 8px; color: var(--fg); font-size: 17px; }\n  .pillar p { margin: 0; color: var(--fg-dim); font-size: 13.5px; line-height: 1.65; }\n  .pillar p code { color: var(--yellow); }\n\n  /* === ruki deep-dive: three big code tiles === */\n  .ruki-grid {\n    display: grid; gap: 16px;\n    grid-template-columns: repeat(3, 1fr);\n  }\n  @media (max-width: 1000px) { .ruki-grid { grid-template-columns: 1fr; } }\n  .ruki-card {\n    background: var(--bg-elev);\n    border: 1px solid var(--line);\n    overflow: hidden;\n    display: flex; flex-direction: column;\n  }\n  .ruki-card .head {\n    padding: 12px 16px;\n    border-bottom: 1px solid var(--line);\n    background: var(--bg-card);\n  }\n  .ruki-card .head .step {\n    color: var(--yellow); font-size: 11px;\n    letter-spacing: .12em; font-weight: 700;\n    margin-bottom: 4px;\n  }\n  .ruki-card .head .ttl {\n    color: var(--fg); font-size: 16px; font-weight: 700;\n    letter-spacing: -0.01em;\n  }\n  .ruki-card .head p {\n    margin: 6px 0 0; color: var(--fg-dim); font-size: 12.5px;\n  }\n  .ruki-card .body {\n    padding: 16px 18px;\n    background: var(--bg-strip);\n    flex: 1;\n    overflow-x: auto;\n  }\n  .ruki-card pre {\n    margin: 0; font-size: 12.5px; line-height: 1.7;\n    color: var(--fg); white-space: pre;\n    font-family: inherit;\n  }\n\n  /* === Markdown viewer deep-dive === */\n  .md-deep {\n    display: grid;\n    grid-template-columns: 1.4fr 1fr;\n    gap: 48px;\n    align-items: start;\n    perspective: 2400px;\n  }\n  @media (max-width: 980px) { .md-deep { grid-template-columns: 1fr; gap: 32px; } }\n  .md-frame {\n    background: var(--bg-elev);\n    border: 1px solid var(--line);\n    border-radius: 8px;\n    overflow: hidden;\n    transform: rotateY(4.5deg) rotateX(-1.5deg);\n    transform-origin: 50% 50%;\n    box-shadow:\n      0 1px 0 rgba(255,255,255,.04) inset,\n      32px 50px 100px -40px rgba(0,0,0,.7),\n      18px 36px 80px -20px color-mix(in oklch, var(--yellow) 26%, transparent),\n      0 22px 50px -20px rgba(0,0,0,.55);\n    transition: transform .6s cubic-bezier(.2,.7,.2,1);\n  }\n  .md-frame:hover { transform: rotateY(1.5deg) rotateX(-.5deg); }\n  @media (max-width: 980px) {\n    .md-frame { transform: none; }\n    .md-frame:hover { transform: none; }\n  }\n  .md-frame .chrome {\n    padding: 8px 14px;\n    background: var(--bg-card);\n    border-bottom: 1px solid var(--line);\n    font-size: 11px;\n    color: var(--fg-faint);\n    display: flex; gap: 10px; align-items: center;\n  }\n  .md-frame .chrome .lights { display: flex; gap: 6px; }\n  .md-frame .chrome .lights i { width: 9px; height: 9px; border-radius: 50%; }\n  .md-frame .chrome .lights i:nth-child(1) { background: var(--red); }\n  .md-frame .chrome .lights i:nth-child(2) { background: var(--yellow); }\n  .md-frame .chrome .lights i:nth-child(3) { background: var(--green); }\n  .md-frame .chrome .file { color: var(--gold); }\n  .md-frame .body { padding: 22px 26px; min-height: 360px; position: relative; }\n\n  .md-bullets { display: flex; flex-direction: column; gap: 18px; }\n  .md-bullets .bullet {\n    border-left: 2px solid var(--yellow);\n    padding: 2px 0 2px 16px;\n  }\n  .md-bullets .bullet h4 {\n    margin: 0 0 4px; color: var(--fg); font-size: 15px; font-weight: 700;\n  }\n  .md-bullets .bullet p {\n    margin: 0; color: var(--fg-dim); font-size: 13.5px; line-height: 1.6;\n  }\n  .md-bullets .bullet p code { color: var(--yellow); }\n\n  /* === workflow.yaml deep-dive === */\n  .wf-deep {\n    display: grid;\n    grid-template-columns: 1.6fr 1fr;\n    gap: 28px;\n    align-items: start;\n  }\n  @media (max-width: 980px) { .wf-deep { grid-template-columns: 1fr; } }\n  .wf-deep .code {\n    background: var(--bg-strip);\n    border: 1px solid var(--line);\n  }\n  .wf-deep .code .head {\n    padding: 10px 14px;\n    border-bottom: 1px solid var(--line);\n    background: var(--bg-elev);\n    font-size: 11px;\n    color: var(--fg-faint);\n    display: flex; gap: 10px; align-items: center;\n  }\n  .wf-deep .code .head .file { color: var(--gold); }\n  .wf-deep .code .head .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }\n  .wf-deep .code pre {\n    margin: 0; padding: 16px 18px;\n    font-size: 12.5px; line-height: 1.7;\n    color: var(--fg); font-family: inherit;\n    white-space: pre; overflow-x: auto;\n  }\n  .wf-side h3 {\n    margin: 0 0 14px; color: var(--fg); font-size: 17px;\n  }\n  .wf-side .views-list .row {\n    display: grid; grid-template-columns: 80px 1fr; gap: 14px;\n    padding: 10px 0; border-bottom: 1px solid var(--line-soft);\n    font-size: 13px;\n  }\n  .wf-side .views-list .row:last-child { border-bottom: 0; }\n  .wf-side .views-list .k { color: var(--yellow); font-weight: 700; }\n  .wf-side .views-list .v { color: var(--fg-dim); }\n  .wf-side .views-list .v code { color: var(--fg); }\n  .wf-side .palette {\n    margin-top: 22px;\n    padding: 16px 18px;\n    background: var(--bg-elev); border: 1px solid var(--line);\n  }\n  .wf-side .palette h4 { margin: 0 0 4px; font-size: 14px; }\n  .wf-side .palette p { margin: 0; color: var(--fg-dim); font-size: 13px; }\n\n  /* === Capture pipes === */\n  .pipes pre {\n    background: var(--bg-strip);\n    border: 1px solid var(--line);\n    padding: 16px 20px;\n    margin: 0;\n    font-size: 13px; line-height: 1.7;\n    color: var(--fg); font-family: inherit;\n    white-space: pre; overflow-x: auto;\n  }\n  .pipes .c { color: var(--green); }\n  .pipes .cm { color: var(--fg-faint); font-style: italic; }\n  .pipes .s { color: var(--olive); }\n  .pipes .b { color: var(--blue); font-weight: 500; }\n\n  /* === Agents === */\n  .agents-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }\n  @media (max-width: 880px) { .agents-grid { grid-template-columns: 1fr 1fr; } }\n  .agent {\n    border: 1px solid var(--line); padding: 16px 18px;\n    background: var(--bg-elev);\n  }\n  .agent .nm { color: var(--fg); font-weight: 700; font-size: 15px; }\n  .agent .badge {\n    color: var(--gold); font-size: 10.5px;\n    letter-spacing: .12em; text-transform: uppercase;\n    font-weight: 700; margin-bottom: 8px;\n  }\n  .agent .m { color: var(--fg-faint); font-size: 11.5px; margin-top: 6px; }\n\n  /* === Feature index === */\n  .feat-table {\n    border: 1px solid var(--line);\n    background: var(--bg-elev);\n  }\n  .feat-row {\n    display: grid;\n    grid-template-columns: minmax(180px, 220px) 1fr;\n    border-bottom: 1px solid var(--line-soft);\n  }\n  .feat-row:last-child { border-bottom: 0; }\n  .feat-row .k {\n    color: var(--yellow);\n    padding: 14px 20px;\n    border-right: 1px solid var(--line-soft);\n    font-weight: 600;\n    font-size: 13.5px;\n  }\n  .feat-row .v {\n    color: var(--fg-dim);\n    padding: 14px 20px;\n    font-size: 13.5px;\n  }\n  .feat-row .v code { color: var(--fg); }\n  @media (max-width: 700px) {\n    .feat-row { grid-template-columns: 1fr; }\n    .feat-row .k { border-right: 0; border-bottom: 1px solid var(--line-soft); padding-bottom: 4px; }\n  }\n\n  /* === Install steps === */\n  .gs-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }\n  @media (max-width: 880px) { .gs-grid { grid-template-columns: 1fr; } }\n  .gs {\n    border: 1px solid var(--line);\n    background: var(--bg-elev);\n    padding: 22px 22px 24px;\n  }\n  .gs .step {\n    color: var(--gold); font-size: 11px;\n    letter-spacing: .14em; font-weight: 700; margin-bottom: 8px;\n  }\n  .gs h3 { margin: 0 0 14px; font-size: 16px; }\n  .gs pre {\n    background: var(--bg-strip); border: 1px solid var(--line);\n    padding: 12px 14px; margin: 0;\n    font-size: 12.5px; color: var(--fg);\n    line-height: 1.75;\n    white-space: pre-wrap; word-break: break-word;\n    font-family: inherit;\n  }\n  .gs pre .c { color: var(--green); }\n  .gs pre .cm { color: var(--fg-faint); font-style: italic; }\n  .gs pre .s { color: var(--olive); }\n\n  /* === Footer === */\n  footer {\n    padding: 48px 0 64px;\n    border-top: 1px solid var(--line-soft);\n    color: var(--fg-faint);\n    font-size: 13px;\n  }\n  .foot-grid {\n    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;\n    gap: 28px; align-items: start;\n  }\n  @media (max-width: 700px) { .foot-grid { grid-template-columns: 1fr 1fr; } }\n  .foot-grid h5 {\n    color: var(--fg); font-size: 12px;\n    letter-spacing: .14em; text-transform: uppercase;\n    margin: 0 0 12px;\n  }\n  .foot-grid a { color: var(--fg-dim); display: block; padding: 3px 0; border: 0; }\n  .foot-grid a:hover { color: var(--yellow); }\n  .foot-grid .brand {\n    color: var(--fg-dim); font-size: 13px; line-height: 1.65;\n  }\n  .foot-grid .brand .b {\n    color: var(--fg); font-weight: 700; font-size: 15px;\n    display: inline-flex; align-items: baseline; gap: 8px; margin-bottom: 8px;\n  }\n  .foot-grid .brand .b .mark {\n    display: inline-block; width: 18px; height: 18px;\n    border: 1.5px solid var(--yellow); color: var(--yellow);\n    text-align: center; line-height: 15px;\n    font-size: 11px; font-weight: 700;\n  }\n<\u002Fstyle>\n\n\n<\u002Fhead>\n<body>\n\n<!-- ================ Top bar ================ -->\n<div class=\"topbar\">\n  <div class=\"topbar-in\">\n    <a href=\"#top\" class=\"brand\">\n      <span class=\"mark\">t<\u002Fspan>\n      <span>tiki<\u002Fspan>\n      <span class=\"ver\">v0.5.3<\u002Fspan>\n    <\u002Fa>\n    <nav class=\"topnav\">\n      <a href=\"#why\">Why<\u002Fa>\n      <a href=\"#ruki\">ruki<\u002Fa>\n      <a href=\"#viewer\">Viewer<\u002Fa>\n      <a href=\ iv class=\"diag-card\">\n                <div class=\"diag-label\">mermaid · sequenceDiagram<\u002Fdiv>\n                <svg viewBox=\"0 0 500 310\" class=\"diag-svg\" xmlns=\"http://www.w3.org/2000/svg\">\n                  <defs>\n                    <marker id=\"hero-arr-y\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"8\" markerHeight=\"8\" orient=\"auto\">\n                      <path d=\"M0 0 L10 5 L0 10 z\" style=\"fill: var(--yellow);\"><\u002Fpath>\n                    <\u002Fmarker>\n                    <marker id=\"hero-arr-t\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"8\" markerHeight=\"8\" orient=\"auto\">\n                      <path d=\"M0 0 L10 5 L0 10 z\" style=\"fill: var(--terra);\"><\u002Fpath>\n                    <\u002Fmarker>\n                  <\u002Fdefs>\n                  <!-- Lifelines -->\n                  <g style=\"stroke: var(--fg-faint); opacity: .5;\" stroke-dasharray=\"3 4\" stroke-width=\"1\">\n                    <line x1=\"60\" y1=\"34\" x2=\"60\" y2=\"302\"><\u002Fline>\n                    <line x1=\"180\" y1=\"34\" x2=\"180\" y2=\"302\"><\u002Fline>\n                    <line x1=\"300\" y1=\"34\" x2=\"300\" y2=\"302\"><\u002Fline>\n                    <line x1=\"420\" y1=\"34\" x2=\"420\" y2=\"302\"><\u002Fline>\n                  <\u002Fg>\n                  <!-- Actor labels -->\n                  <g font-size=\"12\" font-weight=\"700\" text-anchor=\"middle\">\n                    <text x=\"60\" y=\"20\" style=\"fill: var(--blue);\">User<\u002Ftext>\n                    <text x=\"180\" y=\"20\" style=\"fill: var(--teal);\">Planner<\u002Ftext>\n                    <text x=\"300\" y=\"20\" style=\"fill: var(--terra);\">Validator<\u002Ftext>\n                    <text x=\"420\" y=\"20\" style=\"fill: var(--green);\">Actuator<\u002Ftext>\n                  <\u002Fg>\n                  <!-- Activation rectangles (varied heights for asymmetry) -->\n                  <g style=\"fill: var(--bg-strip); stroke: var(--line);\" stroke-width=\"1\">\n                    <rect x=\"176\" y=\"56\" width=\"8\" height=\"216\"><\u002Frect>\n                    <rect x=\"296\" y=\"92\" width=\"8\" height=\"158\"><\u002Frect>\n                    <rect x=\"416\" y=\"170\" width=\"8\" height=\"38\"><\u002Frect>\n                  <\u002Fg>\n                  <!-- Messages -->\n                  <!-- 1. User → Planner -->\n                  <text x=\"120\" y=\"52\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">upload(plan)<\u002Ftext>\n                  <line x1=\"62\" y1=\"62\" x2=\"178\" y2=\"62\" style=\"stroke: var(--yellow);\" stroke-width=\"1.1\" marker-end=\"url(#hero-arr-y)\"><\u002Fline>\n                  <!-- 2. Planner → Validator -->\n                  <text x=\"240\" y=\"84\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">parse(yaml)<\u002Ftext>\n                  <line x1=\"184\" y1=\"98\" x2=\"298\" y2=\"98\" style=\"stroke: var(--yellow);\" stroke-width=\"1.1\" marker-end=\"url(#hero-arr-y)\"><\u002Fline>\n                  <!-- 3. Validator self-loop (asymmetric flourish) -->\n                  <path d=\"M 304 122 C 368 122, 368 144, 308 144\" fill=\"none\" style=\"stroke: var(--yellow);\" stroke-width=\"1.1\" marker-end=\"url(#hero-arr-y)\"><\u002Fpath>\n                  <text x=\"378\" y=\"138\" text-anchor=\"start\" font-size=\"11\" style=\"fill: var(--fg);\">compute hash<\u002Ftext>\n                  <text x=\"378\" y=\"152\" text-anchor=\"start\" font-size=\"9.5\" style=\"fill: var(--fg-faint); font-style: italic;\">≈ 18ms · sha-256<\u002Ftext>\n                  <!-- 4. Validator → Actuator -->\n                  <text x=\"360\" y=\"178\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">verify(geofence)<\u002Ftext>\n                  <line x1=\"304\" y1=\"190\" x2=\"418\" y2=\"190\" style=\"stroke: var(--yellow);\" stroke-width=\"1.1\" marker-end=\"url(#hero-arr-y)\"><\u002Fline>\n
