Box=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto\">\n                      <path d=\"M0 0 L10 5 L0 10 z\" style=\"fill: var(--green);\"><\u002Fpath>\n                    <\u002Fmarker>\n                    <marker id=\"hero-arr-r\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto\">\n                      <path d=\"M0 0 L10 5 L0 10 z\" style=\"fill: var(--red);\"><\u002Fpath>\n                    <\u002Fmarker>\n                  <\u002Fdefs>\n\n                  <!-- 1. Start pill -->\n                  <rect x=\"180\" y=\"10\" width=\"140\" height=\"34\" rx=\"17\" style=\"fill: color-mix(in oklch, var(--blue) 14%, transparent); stroke: var(--blue);\" stroke-width=\"1.2\"><\u002Frect>\n                  <text x=\"250\" y=\"32\" text-anchor=\"middle\" font-size=\"12\" style=\"fill: var(--fg);\">receive(frame)<\u002Ftext>\n                  <line x1=\"250\" y1=\"46\" x2=\"250\" y2=\"58\" style=\"stroke: var(--fg-dim);\" stroke-width=\"1\" marker-end=\"url(#hero-arr-d)\"><\u002Fline>\n\n                  <!-- 2. Parse rect -->\n                  <rect x=\"180\" y=\"60\" width=\"140\" height=\"34\" rx=\"4\" style=\"fill: color-mix(in oklch, var(--teal) 14%, transparent); stroke: var(--teal);\" stroke-width=\"1.2\"><\u002Frect>\n                  <text x=\"250\" y=\"82\" text-anchor=\"middle\" font-size=\"12\" style=\"fill: var(--fg);\">parse(yaml)<\u002Ftext>\n                  <line x1=\"250\" y1=\"96\" x2=\"250\" y2=\"108\" style=\"stroke: var(--fg-dim);\" stroke-width=\"1\" marker-end=\"url(#hero-arr-d)\"><\u002Fline>\n\n                  <!-- 3. Decision 1: schema valid? -->\n                  <polygon points=\"250,110 342,152 250,194 158,152\" style=\"fill: color-mix(in oklch, var(--terra) 14%, transparent); stroke: var(--terra);\" stroke-width=\"1.2\"><\u002Fpolygon>\n                  <text x=\"250\" y=\"148\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">schema<\u002Ftext>\n                  <text x=\"250\" y=\"163\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">valid?<\u002Ftext>\n\n                  <!-- yes (down) -->\n                  <text x=\"261\" y=\"216\" text-anchor=\"start\" font-size=\"10\" style=\"fill: var(--green); font-weight: 600;\">yes<\u002Ftext>\n                  <line x1=\"250\" y1=\"196\" x2=\"250\" y2=\"220\" style=\"stroke: var(--green);\" stroke-width=\"1.1\" marker-end=\"url(#hero-arr-g)\"><\u002Fline>\n\n                  <!-- no (right, short horizontal) -->\n                  <text x=\"350\" y=\"142\" text-anchor=\"start\" font-size=\"10\" style=\"fill: var(--red); font-weight: 600;\">no<\u002Ftext>\n                  <line x1=\"344\" y1=\"152\" x2=\"372\" y2=\"152\" style=\"stroke: var(--red);\" stroke-width=\"1.1\" marker-end=\"url(#hero-arr-r)\"><\u002Fline>\n\n                  <!-- 4. 400 terminal pill (no branch) -->\n                  <rect x=\"376\" y=\"136\" width=\"100\" height=\"32\" rx=\"16\" style=\"fill: color-mix(in oklch, var(--red) 16%, transparent); stroke: var(--red);\" stroke-width=\"1.2\"><\u002Frect>\n                  <text x=\"426\" y=\"156\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">400 ✗<\u002Ftext>\n\n                  <!-- 5. Verify rect -->\n                  <rect x=\"180\" y=\"222\" width=\"140\" height=\"34\" rx=\"4\" style=\"fill: color-mix(in oklch, var(--teal) 14%, transparent); stroke: var(--teal);\" stroke-width=\"1.2\"><\u002Frect>\n                  <text x=\"250\" y=\"244\" text-anchor=\"middle\" font-size=\"12\" style=\"fill: var(--fg);\">verify(geofence)<\u002Ftext>\n                  <line x1=\"250\" y1=\"258\" x2=\"250\" y2=\"270\" style=\"stroke: var(--fg-dim);\" stroke-width=\"1\" marker-end=\"url(#hero-arr-d)\"><\u002Fline>\n\n                  <!-- 6. Decision 2: in bounds? -->\n                  <polygon points=\"250,272 342,314 250,356 158,314\" style=\"fill: color-mix(in oklch, var(--terra) 14%, transparent); stroke: var(--terra);\" stroke-width=\"1.2\"><\u002Fpolygon>\n                  <text x=\"250\" y=\"310\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">in<\u002Ftext>\n                  <text x=\"250\" y=\"325\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">bounds?<\u002Ftext>\n\n                  <!-- yes (down-left curve) -->\n                  <text x=\"155\" y=\"365\" text-anchor=\"middle\" font-size=\"10\" style=\"fill: var(--green); font-weight: 600;\">yes<\u002Ftext>\n                  <path d=\"M 198 342 Q 140 366 118 386\" fill=\"none\" style=\"stroke: var(--green);\" stroke-width=\"1.1\" marker-end=\"url(#hero-arr-g)\"><\u002Fpath>\n\n                  <!-- no (down-right curve) -->\n                  <text x=\"345\" y=\"365\" text-anchor=\"middle\" font-size=\"10\" style=\"fill: var(--red); font-weight: 600;\">no<\u002Ftext>\n                  <path d=\"M 302 342 Q 360 366 382 386\" fill=\"none\" style=\"stroke: var(--red);\" stroke-width=\"1.1\" marker-end=\"url(#hero-arr-r)\"><\u002Fpath>\n\n                  <!-- 7. Apply rect (yes branch) -->\n                  <rect x=\"50\" y=\"390\" width=\"135\" height=\"34\" rx=\"4\" style=\"fill: color-mix(in oklch, var(--green) 14%, transparent); stroke: var(--green);\" stroke-width=\"1.2\"><\u002Frect>\n                  <text x=\"118\" y=\"412\" text-anchor=\"middle\" font-size=\"12\" style=\"fill: var(--fg);\">apply(plan)<\u002Ftext>\n                  <line x1=\"118\" y1=\"426\" x2=\"118\" y2=\"436\" style=\"stroke: var(--fg-dim);\" stroke-width=\"1\" marker-end=\"url(#hero-arr-d)\"><\u002Fline>\n\n                  <!-- 8. notify hex -->\n                  <polygon points=\"60,440 105,438 175,438 165,456 70,456\" style=\"fill: color-mix(in oklch, var(--gold) 14%, transparent); stroke: var(--gold);\" stroke-width=\"1.2\"><\u002Fpolygon>\n                  <text x=\"118\" y=\"453\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">notify(ops)<\u002Ftext>\n\n                  <!-- 9. log+403 terminal pill (no branch) -->\n                  <rect x=\"295\" y=\"390\" width=\"135\" height=\"34\" rx=\"17\" style=\"fill: color-mix(in oklch, var(--red) 16%, transparent); stroke: var(--red);\" stroke-width=\"1.2\"><\u002Frect>\n                  <text x=\"362\" y=\"412\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">403 + alert ✗<\u002Ftext>\n                <\u002Fsvg>\n              <\u002Fdiv>\n\n              <h2 class=\"md\">Source<\u002Fh2>\n              <div class=\"code-block\">\n                <span class=\"lang\">go<\u002Fspan><span style=\"color: var(--terra);\">func<\u002Fspan> <span style=\"color: var(--teal);\">validate<\u002Fspan>(plan *Plan) <span style=\"color: var(--terra);\">error<\u002Fspan> {\n  <span style=\"color: var(--terra);\">if<\u002Fspan> !geofence.Contains(plan.Waypoints) {\n    <span style=\"color: var(--terra);\">return<\u002Fspan> ErrOutsideGeofence\n  }\n  <span style=\"color: var(--terra);\">return<\u002Fspan> <span style=\"color: var(--blue);\">nil<\u002Fspan>\n}<\u002Fdiv>\n\n              <p class=\"md\" style=\"color: var(--fg-dim); margin-top: 14px;\">\n                <code class=\"inline\">Tab<\u002Fcode> follow link ·\n                <code class=\"inline\">e<\u002Fcode> edit in <code class=\"inline\">$EDITOR<\u002Fcode> ·\n                <code class=\"inline\">/<\u002Fcode> search ·\n                <code class=\"inline\">g/G<\u002Fcode> top · bottom\n              <\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- ----- ruki view ----- -->\n          <div class=\"tui-view\" data-tab=\"ruki\">\n            <div class=\"ruki-view\">\n              <div class=\"top\">\n                <div class=\"panel\">\n                  <div class=\"label\">QUERY · ruki<\u002Fdiv>\n                  <pre><span class=\"t-prop\">tiki<\u002Fspan>&gt; <span class=\"t-kw\">select<\u002Fspan> <span class=\"t-kw\">where<\u002Fspan> status = <span class=\"t-str\">\"inProgress\"<\u002Fspan>\n        <span class=\"t-kw\">and<\u002Fspan> priority &lt; <span class=\"t-str\">\"medium\"<\u002Fspan>\n  <span class=\"t-kw\">order by<\u002Fspan> priority, createdAt<\u002Fpre>\n                <\u002Fdiv>\n                <div class=\"panel res\">\n                  <div class=\"label\">RESULT · 5 tikis<\u002Fdiv>\n                  <div class=\"row\"><span class=\"icon bug\">✸<\u002Fspan><span class=\"id\">TIKI-3W5UZB<\u002Fspan><span class=\"title\">Fix race condition in actuator…<\u002Fspan><\u002Fdiv>\n                  <div class=\"row\"><span class=\"icon task\">▢<\u002Fspan><span class=\"id\">TIKI-IKCIDK<\u002Fspan><span class=\"title\">Integrate ground station radio…<\u002Fspan><\u002Fdiv>\n                  <div class=\"row\"><span class=\"icon research\">🔍<\u002Fspan><span class=\"id\">TIKI-XVG0FN<\u002Fspan><span class=\"title\">Investigate telemetry latency<\u002Fspan><\u002Fdiv>\n                  <div class=\"row\"><span class=\"icon task\">▢<\u002Fspan><span class=\"id\">TIKI-WNNHJ7<\u002Fspan><span class=\"title\">Migrate CI pipeline to ARM<\u002Fspan><\u002Fdiv>\n                  <div class=\"row\"><span class=\"icon task\">▢<\u002Fspan><span class=\"id\">TIKI-6DPBHS<\u002Fspan><span class=\"title\">Design telemetry compression<\u002Fspan><\u002Fdiv>\n                  <div class=\"meta\">↓ &lt;Enter&gt; open · &lt;y&gt; copy id · &lt;e&gt; edit<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div class=\"panel\" style=\"margin-top: 14px;\">\n                <div class=\"label\">TRIGGER · before update · auto-complete an epic<\u002Fdiv>\n<pre><span class=\"t-kw\">after update<\u002Fspan>\n  <span class=\"t-kw\">where<\u002Fspan> new.status = <span class=\"t-str\">\"done\"<\u002Fspan>\n  <span class=\"t-kw\">update where<\u002Fspan> type = <span class=\"t-str\">\"epic\"<\u002Fspan>\n   <span class=\"t-kw\">and<\u002Fspan> new.id <span class=\"t-kw\">in<\u002Fspan> dependsOn\n   <span class=\"t-kw\">and<\u002Fspan> dependsOn <span class=\"t-kw\">all<\u002Fspan> status = <span class=\"t-str\">\"done\"<\u002Fspan>\n  <span class=\"t-kw\">set<\u002Fspan> status = <span class=\"t-str\">\"done\"<\u002Fspan><\u002Fpre>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- ----- workflow view ----- -->\n          <div class=\"tui-view\" data-tab=\"workflow\">\n            <div class=\"wf-view\">\n              <div class=\"code-panel\">\n<pre><span class=\"t-prop\">fields<\u002Fspan>:\n  - <span class=\"t-prop\">name<\u002Fspan>: status\n    <span class=\"t-prop\">type<\u002Fspan>: enum\n    <span class=\"t-prop\">values<\u002Fspan>:\n      - {<span class=\"t-prop\">value<\u002Fspan>: backlog,    <span class=\"t-prop\">label<\u002Fspan>: Backlog,     <span class=\"t-prop\">visual<\u002Fspan>: <span class=\"t-str\">\"📥\"<\u002Fspan>, <span class=\"t-prop\">default<\u002Fspan>: <span class=\"t-kw\">true<\u002Fspan>}\n      - {<span class=\"t-prop\">value<\u002Fspan>: inProgress, <span class=\"t-prop\">label<\u002Fspan>: In Progress, <span class=\"t-prop\">visual<\u002Fspan>: <span class=\"t-str\">\"⚙\"<\u002Fspan>}\n      - {<span class=\"t-prop\">value<\u002Fspan>: review,     <span class=\"t-prop\">label<\u002Fspan>: Review,      <span class=\"t-prop\">visual<\u002Fspan>: <span class=\"t-str\">\"👀\"<\u002Fspan>}\n      - {<span class=\"t-prop\">value<\u002Fspan>: done,       <span class=\"t-prop\">label<\u002Fspan>: Done,        <span class=\"t-prop\">visual<\u002Fspan>: <span class=\"t-str\">\"✓\"<\u002Fspan>}\n\n<span class=\"t-prop\">views<\u002Fspan>:\n  - <span class=\"t-prop\">name<\u002Fspan>: Kanban\n    <span class=\"t-prop\">kind<\u002Fspan>: board\n    <span class=\"t-prop\">key<\u002Fspan>:  F1\n    <span class=\"t-prop\">lanes<\u002Fspan>:\n      - <span class=\"t-prop\">name<\u002Fspan>: In Progress\n        <span class=\"t-prop\">filter<\u002Fspan>: <span class=\"t-kw\">select where<\u002Fspan> status = <span class=\"t-str\">\"inProgress\"<\u002Fspan>\n        <span class=\"t-prop\">action<\u002Fspan>: <span class=\"t-kw\">update where<\u002Fspan> id = <span class=\"t-fn\">id<\u002Fspan>()\n                <span class=\"t-kw\">set<\u002Fspan> status = <span class=\"t-str\">\"inProgress\"<\u002Fspan>\n\n<span class=\"t-prop\">actions<\u002Fspan>:\n  - {<span class=\"t-prop\">key<\u002Fspan>: <span class=\"t-str\">\"a\"<\u002Fspan>, <span class=\"t-prop\">label<\u002Fspan>: Assign to me,\n     <span class=\"t-prop\">action<\u002Fspan>: <span class=\"t-kw\">update where<\u002Fspan> id = <span class=\"t-fn\">id<\u002Fspan>() <span class=\"t-kw\">set<\u002Fspan> assignee = <span class=\"t-fn\">user<\u002Fspan>()}\n  - {<span class=\"t-prop\">key<\u002Fspan>: <span class=\"t-str\">\"+\"<\u002Fspan>, <span class=\"t-prop\">label<\u002Fspan>: Priority up,\n     <span class=\"t-prop\">action<\u002Fspan>: <span class=\"t-kw\">update where<\u002Fspan> id = <span class=\"t-fn\">id<\u002Fspan>()\n              <span class=\"t-kw\">set<\u002Fspan> priority = <span class=\"t-fn\">prev_enum<\u002Fspan>(priority)}<\u002Fpre>\n              <\u002Fdiv>\n              <div class=\"legend\">\n                <div class=\"item\">\n                  <div class=\"h\">fields<\u002Fdiv>\n                  <p>Typed enums, lists, dates, free text. Each enum value carries a label and a visual.<\u002Fp>\n                <\u002Fdiv>\n                <div class=\"item\">\n                  <div class=\"h\">views<\u002Fdiv>\n                  <p>Four kinds: <code>board<\u002Fcode>, <code>list<\u002Fcode>, <code>wiki<\u002Fcode>, <code>detail<\u002Fcode> — each driven by a ruki filter.<\u002Fp>\n                <\u002Fdiv>\n                <div class=\"item\">\n                  <div class=\"h\">actions<\u002Fdiv>\n                  <p>Bind any key to a ruki statement. Pop a picker with <code>choose()<\u002Fcode>; prompt with <code>input()<\u002Fcode>.<\u002Fp>\n                <\u002Fdiv>\n                <div class=\"item\">\n                  <div class=\"h\">triggers<\u002Fdiv>\n                  <p><code>before<\u002Fcode>/<code>after<\u002Fcode> events &amp; <code>every &lt;duration&gt;<\u002Fcode> hooks — also just ruki.<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"tui-foot\">\n          <span class=\"pill\">0.5.3<\u002Fspan>\n          <span class=\"seg\">~/projects/celestia<\u002Fspan>\n          <span style=\"color:var(--fg-faint)\">⌥<\u002Fspan>\n          <span class=\"seg\">main<\u002Fspan>\n          <span style=\"color:var(--fg-faint)\">·<\u002Fspan>\n          <span style=\"color:var(--fg-faint)\">clean<\u002Fspan>\n          <span class=\"right\">⏎ open · ⇧←→ move · ? palette<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================ Why pillars ================ -->\n<a id=\"why\"><\u002Fa>\n<section class=\"below\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"lbl\">why tiki<\u002Fdiv>\n      <h2>Markdown · git · terminal.<br>Nothing else to learn.<\u002Fh2>\n      <p>Your task tracker, wiki, and notes shouldn't live in another SaaS tab. tiki gives them the same home as your code, in the same format you already write every day.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"pillars3\">\n      <div class=\"pillar\">\n        <div class=\"num\">━ 01 MARKDOWN<\u002Fdiv>\n        <h3>One file. One entity.<\u002Fh3>\n        <p>Every tiki is a Markdown file with YAML frontmatter. Open one in <code>vim<\u002Fcode> and you've opened the database.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"num\">━ 02 GIT<\u002Fdiv>\n        <h3>Your repo is the database.<\u002Fh3>\n        <p>No server, no sync, no account. Diffs are human-readable; <code>git blame<\u002Fcode> is your audit trail.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"num\">━ 03 TERMINAL<\u002Fdiv>\n        <h3>Runs anywhere you do.<\u002Fh3>\n        <p>A <code>tview<\u002Fcode>/<code>tcell<\u002Fcode> TUI with vim keys. SSH, tmux, container — single binary, no daemon.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================ Ruki deep-dive ================ -->\n<a id=\"ruki\"><\u002Fa>\n<section class=\"below\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"lbl\">ruki · query &amp; update language<\u002Fdiv>\n      <h2><span class=\"em\">ruki<\u002Fspan> — SQL-shaped. Markdown-aware.<\u002Fh2>\n      <p>One grammar runs <strong>view filters<\u002Fstrong>, <strong>lane definitions<\u002Fstrong>, <strong>keybinding actions<\u002Fstrong>, and <strong>time/event triggers<\u002Fstrong>. Read it once, use it everywhere.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"ruki-grid\">\n      <div class=\"ruki-card\">\n        <div class=\"head\">\n          <div class=\"step\">━ 01 / CRUD<\u002Fdiv>\n          <div class=\"ttl\">The familiar verbs.<\u002Fdiv>\n          <p>select · update · create · delete — over a typed graph of Markdown files.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"body\">\n<pre><span class=\"t-kw\">select<\u002Fspan> <span class=\"t-kw\">where<\u002Fspan> status = <span class=\"t-str\">\"inProgress\"<\u002Fspan>\n       <span class=\"t-kw\">and<\u002Fspan> priority &lt; <span class=\"t-str\">\"medium\"<\u002Fspan>\n  <span class=\"t-kw\">order by<\u002Fspan> priority, createdAt\n\n<span class=\"t-kw\">update<\u002Fspan> <span class=\"t-kw\">where<\u002Fspan> id = <span class=\"t-fn\">id<\u002Fspan>()\n  <span class=\"t-kw\">set<\u002Fspan> assignee = <span class=\"t-fn\">user<\u002Fspan>()\n\n<span class=\"t-kw\">create<\u002Fspan> title = <span class=\"t-fn\">input<\u002Fspan>()\n       status = <span class=\"t-str\">\"backlog\"<\u002Fspan>\n\n<span class=\"t-kw\">delete<\u002Fspan> <span class=\"t-kw\">where<\u002Fspan> status = <span class=\"t-str\">\"done\"<\u002Fspan>\n       <span class=\"t-kw\">and<\u002Fspan> updatedAt &lt; <span class=\"t-fn\">now<\u002Fspan>() - <span class=\"t-num\">1day<\u002Fspan><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"ruki-card\">\n        <div class=\"head\">\n          <div class=\"step\">━ 02 / TRIGGERS<\u002Fdiv>\n          <div class=\"ttl\">Time- &amp; event-driven.<\u002Fdiv>\n          <p>Hook the same statements onto before/after events and every intervals.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"body\">\n<pre><span class=\"t-cm\"># block done when deps still open<\u002Fspan>\n<span class=\"t-kw\">before update<\u002Fspan>\n  <span class=\"t-kw\">where<\u002Fspan> new.status = <span class=\"t-str\">\"done\"<\u002Fspan>\n    <span class=\"t-kw\">and<\u002Fspan> new.dependsOn <span class=\"t-kw\">any<\u002Fspan> status != <span class=\"t-str\">\"done\"<\u002Fspan>\n  <span class=\"t-kw\">deny<\u002Fspan> <span class=\"t-str\">\"has open dependencies\"<\u002Fspan>\n\n<span class=\"t-cm\"># auto-complete epics<\u002Fspan>\n<span class=\"t-kw\">after update<\u002Fspan>\n  <span class=\"t-kw\">where<\u002Fspan> new.status = <span class=\"t-str\">\"done\"<\u002Fspan>\n  <span class=\"t-kw\">update where<\u002Fspan> type = <span class=\"t-str\">\"epic\"<\u002Fspan>\n   <span class=\"t-kw\">and<\u002Fspan> new.id <span class=\"t-kw\">in<\u002Fspan> dependsOn\n   <span class=\"t-kw\">and<\u002Fspan> dependsOn <span class=\"t-kw\">all<\u002Fspan> status = <span class=\"t-str\">\"done\"<\u002Fspan>\n  <span class=\"t-kw\">set<\u002Fspan> status = <span class=\"t-str\">\"done\"<\u002Fspan><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"ruki-card\">\n        <div class=\"head\">\n          <div class=\"step\">━ 03 / ACTIONS<\u002Fdiv>\n          <div class=\"ttl\">Bind any keystroke.<\u002Fdiv>\n          <p>choose() pops a fuzzy picker; input() prompts for a string. Bulk edits stay one keypress away.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"body\">\n<pre><span class=\"t-cm\"># bind 'L' to link a tiki to an epic<\u002Fspan>\n- {<span class=\"t-prop\">key<\u002Fspan>: <span class=\"t-str\">\"L\"<\u002Fspan>,\n   <span class=\"t-prop\">label<\u002Fspan>: Link to epic,\n   <span class=\"t-prop\">action<\u002Fspan>:\n     <span class=\"t-kw\">update<\u002Fspan> <span class=\"t-kw\">where<\u002Fspan> id = <span class=\"t-fn\">id<\u002Fspan>()\n       <span class=\"t-kw\">set<\u002Fspan> dependsOn = dependsOn + <span class=\"t-fn\">choose<\u002Fspan>(\n         <span class=\"t-kw\">select where<\u002Fspan> type = <span class=\"t-str\">\"epic\"<\u002Fspan>\n            <span class=\"t-kw\">and<\u002Fspan> outer.id <span class=\"t-kw\">not in<\u002Fspan> dependsOn\n       )}\n\n<span class=\"t-cm\"># bind 't' to add a tag, prompting input<\u002Fspan>\n- {<span class=\"t-prop\">key<\u002Fspan>: <span class=\"t-str\">\"t\"<\u002Fspan>, <span class=\"t-prop\">input<\u002Fspan>: string,\n   <span class=\"t-prop\">action<\u002Fspan>: <span class=\"t-kw\">update where<\u002Fspan> id = <span class=\"t-fn\">id<\u002Fspan>()\n            <span class=\"t-kw\">set<\u002Fspan> tags = tags + [<span class=\"t-fn\">input<\u002Fspan>()]}<\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================ Markdown viewer deep-dive ================ -->\n<a id=\"viewer\"><\u002Fa>\n<section class=\"below\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"lbl\">markdown viewer<\u002Fdiv>\n      <h2>A real reader,<br>in the terminal.<\u002Fh2>\n      <p>Inline images on capable terminals (iTerm2, Kitty, WezTerm). <strong>Mermaid diagrams render in place<\u002Fstrong>. Link navigation with vim keys. Back/forward history. Jump-to-TOC.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"md-deep\">\n      <div class=\"md-frame\">\n        <div class=\"chrome\">\n          <div class=\"lights\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n          <span class=\"file\">~/docs/markdown-support.md<\u002Fspan>\n          <span style=\"margin-left:auto; color: var(--fg-faint);\">view · pager · vim<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"viewer\">\n            <div class=\"breadcrumbs\">~/<span class=\"b\">docs<\u002Fspan>/<span class=\"b\">spikes<\u002Fspan>/api-versioning.md<\u002Fdiv>\n            <h1 class=\"md\">API Versioning Spike<\u002Fh1>\n\n            <p class=\"md\">\n              We shipped three breaking changes last quarter without a deprecation window.\n              This spike documents a versioning scheme using URL path prefixes and a minimum\n              <code class=\"inline\">90-day<\u002Fcode> sunset period.\n            <\u002Fp>\n\n            <h2 class=\"md\">Request Flow<\u002Fh2>\n            <div class=\"diag-card\">\n              <div class=\"diag-label\">mermaid · sequenceDiagram<\u002Fdiv>\n              <svg viewBox=\"0 0 500 310\" class=\"diag-svg\" xmlns=\"http://www.w3.org/2000/svg\">\n                <defs>\n                  <marker id=\"dd-arr-y\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"8\" markerHeight=\"8\" orient=\"auto\">\n                    <path d=\"M0 0 L10 5 L0 10 z\" style=\"fill: var(--yellow);\"><\u002Fpath>\n                  <\u002Fmarker>\n                  <marker id=\"dd-arr-t\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"8\" markerHeight=\"8\" orient=\"auto\">\n                    <path d=\"M0 0 L10 5 L0 10 z\" style=\"fill: var(--terra);\"><\u002Fpath>\n                  <\u002Fmarker>\n                <\u002Fdefs>\n                <g style=\"stroke: var(--fg-faint); opacity: .5;\" stroke-dasharray=\"3 4\" stroke-width=\"1\">\n                  <line x1=\"60\" y1=\"34\" x2=\"60\" y2=\"302\"><\u002Fline>\n                  <line x1=\"180\" y1=\"34\" x2=\"180\" y2=\"302\"><\u002Fline>\n                  <line x1=\"300\" y1=\"34\" x2=\"300\" y2=\"302\"><\u002Fline>\n                  <line x1=\"420\" y1=\"34\" x2=\"420\" y2=\"302\"><\u002Fline>\n                <\u002Fg>\n                <g font-size=\"12\" font-weight=\"700\" text-anchor=\"middle\">\n                  <text x=\"60\" y=\"20\" style=\"fill: var(--blue);\">Client<\u002Ftext>\n                  <text x=\"180\" y=\"20\" style=\"fill: var(--teal);\">Gateway<\u002Ftext>\n                  <text x=\"300\" y=\"20\" style=\"fill: var(--terra);\">Adapter v1<\u002Ftext>\n                  <text x=\"420\" y=\"20\" style=\"fill: var(--green);\">Service v2<\u002Ftext>\n                <\u002Fg>\n                <g style=\"fill: var(--bg-strip); stroke: var(--line);\" stroke-width=\"1\">\n                  <rect x=\"176\" y=\"56\" width=\"8\" height=\"216\"><\u002Frect>\n                  <rect x=\"296\" y=\"92\" width=\"8\" height=\"158\"><\u002Frect>\n                  <rect x=\"416\" y=\"170\" width=\"8\" height=\"38\"><\u002Frect>\n                <\u002Fg>\n                <text x=\"120\" y=\"52\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">GET /v1/orders<\u002Ftext>\n                <line x1=\"62\" y1=\"62\" x2=\"178\" y2=\"62\" style=\"stroke: var(--yellow);\" stroke-width=\"1.1\" marker-end=\"url(#dd-arr-y)\"><\u002Fline>\n                <text x=\"240\" y=\"84\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">route(v1)<\u002Ftext>\n                <line x1=\"184\" y1=\"98\" x2=\"298\" y2=\"98\" style=\"stroke: var(--yellow);\" stroke-width=\"1.1\" marker-end=\"url(#dd-arr-y)\"><\u002Fline>\n                <path d=\"M 304 122 C 368 122, 368 144, 308 144\" fill=\"none\" style=\"stroke: var(--yellow);\" stroke-width=\"1.1\" marker-end=\"url(#dd-arr-y)\"><\u002Fpath>\n                <text x=\"378\" y=\"138\" text-anchor=\"start\" font-size=\"11\" style=\"fill: var(--fg);\">check cache<\u002Ftext>\n                <text x=\"378\" y=\"152\" text-anchor=\"start\" font-size=\"9.5\" style=\"fill: var(--fg-faint); font-style: italic;\">miss · ttl 30s<\u002Ftext>\n                <text x=\"360\" y=\"178\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">translate(req)<\u002Ftext>\n                <line x1=\"304\" y1=\"190\" x2=\"418\" y2=\"190\" style=\"stroke: var(--yellow);\" stroke-width=\"1.1\" marker-end=\"url(#dd-arr-y)\"><\u002Fline>\n                <line x1=\"418\" y1=\"208\" x2=\"306\" y2=\"208\" style=\"stroke: var(--terra);\" stroke-width=\"1.1\" marker-end=\"url(#dd-arr-t)\"><\u002Fline>\n                <text x=\"360\" y=\"224\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg-dim);\">v2 payload<\u002Ftext>\n                <text x=\"240\" y=\"244\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">shim → v1 shape<\u002Ftext>\n                <line x1=\"296\" y1=\"254\" x2=\"184\" y2=\"254\" style=\"stroke: var(--terra);\" stroke-width=\"1.1\" marker-end=\"url(#dd-arr-t)\"><\u002Fline>\n                <text x=\"120\" y=\"276\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">200 + Deprecation<\u002Ftext>\n                <line x1=\"176\" y1=\"270\" x2=\"64\" y2=\"270\" style=\"stroke: var(--terra);\" stroke-width=\"1.1\" marker-end=\"url(#dd-arr-t)\"><\u002Fline>\n                <text x=\"240\" y=\"298\" text-anchor=\"middle\" font-size=\"10\" style=\"fill: var(--fg-faint); font-style: italic;\">sunset: 2026-08-15 · 90-day window<\u002Ftext>\n              <\u002Fsvg>\n            <\u002Fdiv>\n\n            <h2 class=\"md\">Version Resolution<\u002Fh2>\n            <div class=\"diag-card\">\n              <div class=\"diag-label\">mermaid · flowchart TD<\u002Fdiv>\n              <svg viewBox=\"0 0 480 460\" class=\"diag-svg\" xmlns=\"http://www.w3.org/2000/svg\">\n                <defs>\n                  <marker id=\"dd2-arr-d\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto\">\n                    <path d=\"M0 0 L10 5 L0 10 z\" style=\"fill: var(--fg-dim);\"><\u002Fpath>\n                  <\u002Fmarker>\n                  <marker id=\"dd2-arr-g\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto\">\n                    <path d=\"M0 0 L10 5 L0 10 z\" style=\"fill: var(--green);\"><\u002Fpath>\n                  <\u002Fmarker>\n                  <marker id=\"dd2-arr-r\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto\">\n                    <path d=\"M0 0 L10 5 L0 10 z\" style=\"fill: var(--red);\"><\u002Fpath>\n                  <\u002Fmarker>\n                  <marker id=\"dd2-arr-t\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto\">\n                    <path d=\"M0 0 L10 5 L0 10 z\" style=\"fill: var(--terra);\"><\u002Fpath>\n                  <\u002Fmarker>\n                <\u002Fdefs>\n                <rect x=\"180\" y=\"10\" width=\"140\" height=\"34\" rx=\"17\" style=\"fill: color-mix(in oklch, var(--blue) 14%, transparent); stroke: var(--blue);\" stroke-width=\"1.2\"><\u002Frect>\n                <text x=\"250\" y=\"32\" text-anchor=\"middle\" font-size=\"12\" style=\"fill: var(--fg);\">incoming(req)<\u002Ftext>\n                <line x1=\"250\" y1=\"46\" x2=\"250\" y2=\"58\" style=\"stroke: var(--fg-dim);\" stroke-width=\"1\" marker-end=\"url(#dd2-arr-d)\"><\u002Fline>\n                <rect x=\"180\" y=\"60\" width=\"140\" height=\"34\" rx=\"4\" style=\"fill: color-mix(in oklch, var(--teal) 14%, transparent); stroke: var(--teal);\" stroke-width=\"1.2\"><\u002Frect>\n                <text x=\"250\" y=\"82\" text-anchor=\"middle\" font-size=\"12\" style=\"fill: var(--fg);\">inspect path<\u002Ftext>\n                <line x1=\"250\" y1=\"96\" x2=\"250\" y2=\"108\" style=\"stroke: var(--fg-dim);\" stroke-width=\"1\" marker-end=\"url(#dd2-arr-d)\"><\u002Fline>\n                <polygon points=\"250,110 342,152 250,194 158,152\" style=\"fill: color-mix(in oklch, var(--terra) 14%, transparent); stroke: var(--terra);\" stroke-width=\"1.2\"><\u002Fpolygon>\n                <text x=\"250\" y=\"148\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">/v1 prefix?<\u002Ftext>\n                <text x=\"250\" y=\"163\" text-anchor=\"middle\" font-size=\"9.5\" style=\"fill: var(--fg-faint);\">(legacy)<\u002Ftext>\n                <text x=\"261\" y=\"216\" text-anchor=\"start\" font-size=\"10\" style=\"fill: var(--green); font-weight: 600;\">yes<\u002Ftext>\n                <line x1=\"250\" y1=\"196\" x2=\"250\" y2=\"220\" style=\"stroke: var(--green);\" stroke-width=\"1.1\" marker-end=\"url(#dd2-arr-g)\"><\u002Fline>\n                <text x=\"350\" y=\"142\" text-anchor=\"start\" font-size=\"10\" style=\"fill: var(--red); font-weight: 600;\">no<\u002Ftext>\n                <line x1=\"344\" y1=\"152\" x2=\"372\" y2=\"152\" style=\"stroke: var(--red);\" stroke-width=\"1.1\" marker-end=\"url(#dd2-arr-r)\"><\u002Fline>\n                <rect x=\"376\" y=\"136\" width=\"100\" height=\"32\" rx=\"16\" style=\"fill: color-mix(in oklch, var(--blue) 16%, transparent); stroke: var(--blue);\" stroke-width=\"1.2\"><\u002Frect>\n                <text x=\"426\" y=\"156\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">service v2<\u002Ftext>\n                <rect x=\"180\" y=\"222\" width=\"140\" height=\"34\" rx=\"4\" style=\"fill: color-mix(in oklch, var(--teal) 14%, transparent); stroke: var(--teal);\" stroke-width=\"1.2\"><\u002Frect>\n                <text x=\"250\" y=\"244\" text-anchor=\"middle\" font-size=\"12\" style=\"fill: var(--fg);\">adapter v1<\u002Ftext>\n                <line x1=\"250\" y1=\"258\" x2=\"250\" y2=\"270\" style=\"stroke: var(--fg-dim);\" stroke-width=\"1\" marker-end=\"url(#dd2-arr-d)\"><\u002Fline>\n                <polygon points=\"250,272 342,314 250,356 158,314\" style=\"fill: color-mix(in oklch, var(--terra) 14%, transparent); stroke: var(--terra);\" stroke-width=\"1.2\"><\u002Fpolygon>\n                <text x=\"250\" y=\"318\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">cache hit?<\u002Ftext>\n                <text x=\"155\" y=\"365\" text-anchor=\"middle\" font-size=\"10\" style=\"fill: var(--green); font-weight: 600;\">yes<\u002Ftext>\n                <path d=\"M 198 342 Q 140 366 118 386\" fill=\"none\" style=\"stroke: var(--green);\" stroke-width=\"1.1\" marker-end=\"url(#dd2-arr-g)\"><\u002Fpath>\n                <text x=\"345\" y=\"365\" text-anchor=\"middle\" font-size=\"10\" style=\"fill: var(--terra); font-weight: 600;\">miss<\u002Ftext>\n                <path d=\"M 302 342 Q 360 366 382 386\" fill=\"none\" style=\"stroke: var(--terra);\" stroke-width=\"1.1\" marker-end=\"url(#dd2-arr-t)\"><\u002Fpath>\n                <rect x=\"50\" y=\"390\" width=\"135\" height=\"34\" rx=\"4\" style=\"fill: color-mix(in oklch, var(--green) 14%, transparent); stroke: var(--green);\" stroke-width=\"1.2\"><\u002Frect>\n                <text x=\"118\" y=\"412\" text-anchor=\"middle\" font-size=\"12\" style=\"fill: var(--fg);\">return cached<\u002Ftext>\n                <line x1=\"118\" y1=\"426\" x2=\"118\" y2=\"436\" style=\"stroke: var(--fg-dim);\" stroke-width=\"1\" marker-end=\"url(#dd2-arr-d)\"><\u002Fline>\n                <polygon points=\"60,440 105,438 175,438 165,456 70,456\" style=\"fill: color-mix(in oklch, var(--gold) 14%, transparent); stroke: var(--gold);\" stroke-width=\"1.2\"><\u002Fpolygon>\n                <text x=\"118\" y=\"453\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">200 + headers<\u002Ftext>\n                <rect x=\"295\" y=\"390\" width=\"135\" height=\"34\" rx=\"4\" style=\"fill: color-mix(in oklch, var(--terra) 14%, transparent); stroke: var(--terra);\" stroke-width=\"1.2\"><\u002Frect>\n                <text x=\"362\" y=\"412\" text-anchor=\"middle\" font-size=\"11\" style=\"fill: var(--fg);\">translate · shim<\u002Ftext>\n              <\u002Fsvg>\n            <\u002Fdiv>\n\n            <p class=\"md\" style=\"color: var(--fg-dim); margin-top: 14px;\">\n              See <span class=\"link\">→ TIKI-5LX06Q<\u002Fspan> for implementation ·\n              <code class=\"inline\">Tab<\u002Fcode> to follow link ·\n              <code class=\"inline\">e<\u002Fcode> to edit\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"md-bullets\">\n        <div class=\"bullet\">\n          <h4>Inline image rendering<\u002Fh4>\n          <p>Real PNGs and JPEGs render in any terminal that supports image protocols — iTerm2, Kitty, WezTerm. Plain <code>file://<\u002Fcode> paths and remote URLs both work.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"bullet\">\n          <h4>Mermaid diagrams in place<\u002Fh4>\n          <p>Flowcharts, sequence, class, and gantt diagrams render inline — without leaving the terminal, without a browser tab.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"bullet\">\n          <h4>Vim-key navigation<\u002Fh4>\n          <p><code>Tab<\u002Fcode>/<code>Enter<\u002Fcode> follows links · <code>j/k<\u002Fcode> scrolls · <code>g/G<\u002Fcode> jumps · <code>/<\u002Fcode> searches · back &amp; forward history just works.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"bullet\">\n          <h4>Jump to any tiki<\u002Fh4>\n          <p>Links by id, like <code>→ TIKI-9XUY41<\u002Fcode>, resolve to the file in <code>.tiki/<\u002Fcode>. Press <code>Enter<\u002Fcode> to follow.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================ Workflow ================ -->\n<a id=\"workflow\"><\u002Fa>\n<section class=\"below\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"lbl\">workflow.yaml<\u002Fdiv>\n      <h2>Your workflow, declared in one file.<\u002Fh2>\n      <p>Fields, views, actions, triggers — <strong>no plugin to compile<\u002Fstrong>, no framework to learn. Commit it with the rest of your repo, branch it like anything else.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"wf-deep\">\n      <div class=\"code\">\n        <div class=\"head\">\n          <span class=\"dot\"><\u002Fspan>\n          <span class=\"file\">workflow.yaml<\u002Fspan>\n          <span style=\"margin-left:auto; color:var(--fg-faint);\">yaml · 73 lines<\u002Fspan>\n        <\u002Fdiv>\n<pre><span class=\"t-prop\">fields<\u002Fspan>:\n  - <span class=\"t-prop\">name<\u002Fspan>: status\n    <span class=\"t-prop\">type<\u002Fspan>: enum\n    <span class=\"t-prop\">values<\u002Fspan>:\n      - {<span class=\"t-prop\">value<\u002Fspan>: backlog,    <span class=\"t-prop\">label<\u002Fspan>: Backlog,     <span class=\"t-prop\">visual<\u002Fspan>: <span class=\"t-str\">\"📥\"<\u002Fspan>, <span class=\"t-prop\">default<\u002Fspan>: <span class=\"t-kw\">true<\u002Fspan>}\n      - {<span class=\"t-prop\">value<\u002Fspan>: inProgress, <span class=\"t-prop\">label<\u002Fspan>: In Progress, <span class=\"t-prop\">visual<\u002Fspan>: <span class=\"t-str\">\"⚙\"<\u002Fspan>}\n      - {<span class=\"t-prop\">value<\u002Fspan>: review,     <span class=\"t-prop\">label<\u002Fspan>: Review,      <span class=\"t-prop\">visual<\u002Fspan>: <span class=\"t-str\">\"👀\"<\u002Fspan>}\n      - {<span class=\"t-prop\">value<\u002Fspan>: done,       <span class=\"t-prop\">label<\u002Fspan>: Done,        <span class=\"t-prop\">visual<\u002Fspan>: <span class=\"t-str\">\"✓\"<\u002Fspan>}\n\n<span class=\"t-prop\">views<\u002Fspan>:\n  - <span class=\"t-prop\">name<\u002Fspan>: Kanban\n    <span class=\"t-prop\">kind<\u002Fspan>: board\n    <span class=\"t-prop\">key<\u002Fspan>:  F1\n    <span class=\"t-prop\">lanes<\u002Fspan>:\n      - <span class=\"t-prop\">name<\u002Fspan>: In Progress\n        <span class=\"t-prop\">filter<\u002Fspan>: <span class=\"t-kw\">select where<\u002Fspan> status = <span class=\"t-str\">\"inProgress\"<\u002Fspan>\n        <span class=\"t-prop\">action<\u002Fspan>: <span class=\"t-kw\">update where<\u002Fspan> id = <span class=\"t-fn\">id<\u002Fspan>()\n                <span class=\"t-kw\">set<\u002Fspan> status = <span class=\"t-str\">\"inProgress\"<\u002Fspan>\n\n<span class=\"t-prop\">actions<\u002Fspan>:\n  - {<span class=\"t-prop\">key<\u002Fspan>: <span class=\"t-str\">\"a\"<\u002Fspan>, <span class=\"t-prop\">label<\u002Fspan>: Assign to me,\n     <span class=\"t-prop\">action<\u002Fspan>: <span class=\"t-kw\">update where<\u002Fspan> id = <span class=\"t-fn\">id<\u002Fspan>() <span class=\"t-kw\">set<\u002Fspan> assignee = <span class=\"t-fn\">user<\u002Fspan>()}\n  - {<span class=\"t-prop\">key<\u002Fspan>: <span class=\"t-str\">\"+\"<\u002Fspan>, <span class=\"t-prop\">label<\u002Fspan>: Priority up,\n     <span class=\"t-prop\">action<\u002Fspan>: <span class=\"t-kw\">update where<\u002Fspan> id = <span class=\"t-fn\">id<\u002Fspan>()\n              <span class=\"t-kw\">set<\u002Fspan> priority = <span class=\"t-fn\">prev_enum<\u002Fspan>(priority)}\n  - {<span class=\"t-prop\">key<\u002Fspan>: <span class=\"t-str\">\"t\"<\u002Fspan>, <span class=\"t-prop\">label<\u002Fspan>: Add tag, <span class=\"t-prop\">input<\u002Fspan>: string,\n     <span class=\"t-prop\">action<\u002Fspan>: <span class=\"t-kw\">update where<\u002Fspan> id = <span class=\"t-fn\">id<\u002Fspan>() <span class=\"t-kw\">set<\u002Fspan> tags = tags + [<span class=\"t-fn\">input<\u002Fspan>()]}<\u002Fpre>\n      <\u002Fdiv>\n\n      <div class=\"wf-side\">\n        <h3>Four view kinds.<\u002Fh3>\n        <div class=\"views-list\">\n          <div class=\"row\"><span class=\"k\">board<\u002Fspan><span class=\"v\">Lanes from ruki filters. Move with <code>Shift+←/→<\u002Fcode>.<\u002Fspan><\u002Fdiv>\n          <div class=\"row\"><span class=\"k\">list<\u002Fspan><span class=\"v\">Sortable rows. Group, sort, filter — same grammar.<\u002Fspan><\u002Fdiv>\n          <div class=\"row\"><span class=\"k\">wiki<\u002Fspan><span class=\"v\">Long-form Markdown index. Link tikis inline by id.<\u002Fspan><\u002Fdiv>\n          <div class=\"row\"><span class=\"k\">detail<\u002Fspan><span class=\"v\">Single tiki. Frontmatter on top, body below, deps to the side.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"palette\">\n          <h4>Action Palette · <span style=\"color: var(--yellow);\">?<\u002Fspan><\u002Fh4>\n          <p>Press <code>?<\u002Fcode> in any view to surface every action right now — what it does, the keybind, the ruki it will run.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================ Quick capture ================ -->\n<section class=\"below\">\n  <div class=\"wrap\">\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: start;\" class=\"cap-grid\">\n      <div>\n        <div class=\"sec-head\" style=\"margin-bottom: 22px;\">\n          <div class=\"lbl\">quick capture<\u002Fdiv>\n          <h2>Pipe anything<br>into tiki.<\u002Fh2>\n          <p>Reads stdin, drops a tiki in your backlog. Wire it into your shell, your editor, your CI — wherever ideas appear.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pipes\">\n<pre><span class=\"cm\"># the obvious<\u002Fspan>\n<span class=\"c\">$<\u002Fspan> echo <span class=\"s\">\"cool idea\"<\u002Fspan> | tiki\n\n<span class=\"cm\"># pull an issue from GitHub<\u002Fspan>\n<span class=\"c\">$<\u002Fspan> gh issue view 42 --json title,body \\\n    -q <span class=\"s\">'\"\\(.title)\\n\\n\\(.body)\"'<\u002Fspan> | tiki\n\n<span class=\"cm\"># bulk-capture unique error lines<\u002Fspan>\n<span class=\"c\">$<\u002Fspan> grep ERROR server.log | sort -u \\\n    | <span class=\"b\">while read<\u002Fspan> -r l; \\\n      <span class=\"b\">do<\u002Fspan> echo <span class=\"s\">\"$l\"<\u002Fspan> | tiki; <span class=\"b\">done<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================ Agents ================ -->\n<section class=\"below\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"lbl\">agents welcome<\u002Fdiv>\n      <h2>Your agent already speaks Markdown.<\u002Fh2>\n      <p>Because tikis are just <code style=\"color:var(--yellow); background:var(--bg-strip); padding:1px 6px; border:1px solid var(--line);\">.md<\u002Fcode> files in your repo, every coding agent already knows the format. Skills ship for the major four — no MCP server required.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"agents-grid\">\n      <div class=\"agent\">\n        <div class=\"badge\">━ skill<\u002Fdiv>\n        <div class=\"nm\">Claude Code<\u002Fdiv>\n        <div class=\"m\">read · search · create · update<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"agent\">\n        <div class=\"badge\">━ skill<\u002Fdiv>\n        <div class=\"nm\">Gemini CLI<\u002Fdiv>\n        <div class=\"m\">read · search · create · update<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"agent\">\n        <div class=\"badge\">━ skill<\u002Fdiv>\n        <div class=\"nm\">Codex<\u002Fdiv>\n        <div class=\"m\">read · search · create · update<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"agent\">\n        <div class=\"badge\">━ skill<\u002Fdiv>\n        <div class=\"nm\">Opencode<\u002Fdiv>\n        <div class=\"m\">read · search · create · update<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================ Features ================ -->\n<a id=\"features\"><\u002Fa>\n<section class=\"below\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"lbl\">feature index<\u002Fdiv>\n      <h2>Everything, on one page.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"feat-table\">\n      <div class=\"feat-row\"><div class=\"k\">Markdown workspace<\u002Fdiv><div class=\"v\">Tasks, docs, notes — all <code>.md<\u002Fcode> files with frontmatter.<\u002Fdiv><\u002Fdiv>\n      <div class=\"feat-row\"><div class=\"k\">Git-native<\u002Fdiv><div class=\"v\">Your repo is the database; diffs are the audit log.<\u002Fdiv><\u002Fdiv>\n      <div class=\"feat-row\"><div class=\"k\">Terminal TUI<\u002Fdiv><div class=\"v\">Boards, lists, wiki, detail views — all in your terminal.<\u002Fdiv><\u002Fdiv>\n      <div class=\"feat-row\"><div class=\"k\">Markdown viewer<\u002Fdiv><div class=\"v\">Inline images, Mermaid diagrams, link nav, vim keys.<\u002Fdiv><\u002Fdiv>\n      <div class=\"feat-row\"><div class=\"k\">ruki language<\u002Fdiv><div class=\"v\">SQL-shaped queries, updates, triggers — one grammar.<\u002Fdiv><\u002Fdiv>\n      <div class=\"feat-row\"><div class=\"k\">workflow.yaml<\u002Fdiv><div class=\"v\">Declarative fields, views, actions, triggers.<\u002Fdiv><\u002Fdiv>\n      <div class=\"feat-row\"><div class=\"k\">Plugin-first views<\u002Fdiv><div class=\"v\"><code>board<\u002Fcode> · <code>list<\u002Fcode> · <code>wiki<\u002Fcode> · <code>detail<\u002Fcode> — composable over any slice.<\u002Fdiv><\u002Fdiv>\n      <div class=\"feat-row\"><div class=\"k\">Quick capture<\u002Fdiv><div class=\"v\"><code>echo \"idea\" | tiki<\u002Fcode> from any pipeline.<\u002Fdiv><\u002Fdiv>\n      <div class=\"feat-row\"><div class=\"k\">AI skills<\u002Fdiv><div class=\"v\">Claude Code · Gemini · Codex · Opencode. No MCP required.<\u002Fdiv><\u002Fdiv>\n      <div class=\"feat-row\"><div class=\"k\">Cross-platform<\u002Fdiv><div class=\"v\">macOS · Linux · Windows. One binary. No daemon.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================ Install ================ -->\n<a id=\"install\"><\u002Fa>\n<section class=\"below\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"lbl\">get started<\u002Fdiv>\n      <h2>Three commands. Then go.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"gs-grid\">\n      <div class=\"gs\">\n        <div class=\"step\">━ 01 · INSTALL<\u002Fdiv>\n        <h3>Grab the binary<\u002Fh3>\n<pre><span class=\"c\">$<\u002Fspan> brew install tiki\n<span class=\"cm\">$ # or<\u002Fspan>\n<span class=\"c\">$<\u002Fspan> curl -sSL tiki.sh | sh<\u002Fpre>\n      <\u002Fdiv>\n      <div class=\"gs\">\n        <div class=\"step\">━ 02 · INIT<\u002Fdiv>\n        <h3>Drop into a repo<\u002Fh3>\n<pre><span class=\"c\">$<\u002Fspan> cd my-project\n<span class=\"c\">$<\u002Fspan> tiki init\n<span class=\"c\">$<\u002Fspan> git add .tiki workflow.yaml\n<span class=\"c\">$<\u002Fspan> git commit -m <span class=\"s\">\"add tiki\"<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n      <div class=\"gs\">\n        <div class=\"step\">━ 03 · OPEN<\u002Fdiv>\n        <h3>Live in the TUI<\u002Fh3>\n<pre><span class=\"c\">$<\u002Fspan> tiki\n<span class=\"cm\">$ # F1 board · F3 backlog<\u002Fspan>\n<span class=\"cm\">$ # F4 docs  · ?  palette<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top: 32px; display:flex; gap: 12px; flex-wrap: wrap;\">\n      <a class=\"btn primary\" href=\"#\">Read the docs →<\u002Fa>\n      <a class=\"btn\" href=\"#\">workflow.yaml reference<\u002Fa>\n      <a class=\"btn\" href=\"#\">View on GitHub<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================ Footer ================ -->\n<footer>\n  <div class=\"wrap\">\n    <div class=\"foot-grid\">\n      <div class=\"brand\">\n        <span class=\"b\"><span class=\"mark\">t<\u002Fspan> tiki<\u002Fspan><br>\n        Your workspace is the repo.<br>\n        Your database is git.<br>\n        <span style=\"color: var(--fg-faint); font-size: 12px; margin-top: 10px; display:block;\">v0.5.3 · MIT licensed<\u002Fspan>\n      <\u002Fdiv>\n      <div>\n        <h5>Product<\u002Fh5>\n        <a href=\"#\">Features<\u002Fa>\n        <a href=\"#\">Changelog<\u002Fa>\n        <a href=\"#\">Roadmap<\u002Fa>\n      <\u002Fdiv>\n      <div>\n        <h5>Docs<\u002Fh5>\n        <a href=\"#\">Quickstart<\u002Fa>\n        <a href=\"#\">workflow.yaml<\u002Fa>\n        <a href=\"#\">ruki reference<\u002Fa>\n        <a href=\"#\">AI skills<\u002Fa>\n      <\u002Fdiv>\n      <div>\n        <h5>Community<\u002Fh5>\n        <a href=\"#\">GitHub<\u002Fa>\n        <a href=\"#\">Discussions<\u002Fa>\n        <a href=\"#\">Issues<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  // === Mouse-tracked tilt + shine on the hero TUI ===\n  (() => {\n    const wrap = document.querySelector('.tui-wrap');\n    if (!wrap) return;\n    const tui = wrap.querySelector('.tui');\n    if (!tui) return;\n    let raf = 0;\n    let tx = -5, ty = 2;   // resting tilt (matches CSS)\n    let cx = -5, cy = 2;   // current (animated)\n    const lerp = (a, b, t) => a + (b - a) * t;\n    function loop() {\n      cx = lerp(cx, tx, .15);\n      cy = lerp(cy, ty, .15);\n      tui.style.transform = `rotateY(${cx.toFixed(2)}deg) rotateX(${cy.toFixed(2)}deg)`;\n      if (Math.abs(cx - tx) > .05 || Math.abs(cy - ty) > .05) {\n        raf = requestAnimationFrame(loop);\n      } else {\n        raf = 0;\n      }\n    }\n    function kick() { if (!raf) raf = requestAnimationFrame(loop); }\n    wrap.addEventListener('mousemove', (e) => {\n      if (window.innerWidth < 1080) return;\n      const r = tui.getBoundingClientRect();\n      const nx = (e.clientX - r.left) / r.width;       // 0..1\n      const ny = (e.clientY - r.top) / r.height;\n      // tilt: invert horizontal so window seems to tilt toward cursor\n      tx = (0.5 - Math.max(0, Math.min(1, nx))) * 14 - 1;\n      ty = (Math.max(0, Math.min(1, ny)) - 0.5) * 8 + 1;\n      tui.style.setProperty('--mx', (nx * 100).toFixed(1) + '%');\n      tui.style.setProperty('--my', (ny * 100).toFixed(1) + '%');\n      tui.style.setProperty('--shine', '1');\n      kick();\n    });\n    wrap.addEventListener('mouseleave', () => {\n      tx = -5; ty = 2;\n      tui.style.setProperty('--shine', '0');\n      kick();\n    });\n  })();\n\n  // === Hover + auto-play view switching ===\n  (() => {\n    const tabs = document.querySelectorAll('.tui-tab');\n    const views = document.querySelectorAll('.tui-view');\n    const rail = document.querySelector('.tui-tabs');\n    if (!tabs.length) return;\n    const order = Array.from(tabs).map(b => b.dataset.tab);\n    // start where the default-active is\n    let idx = order.indexOf(\n      document.querySelector('.tui-tab.active')?.dataset.tab || order[0]\n    );\n    let timer = null;\n    const INTERVAL = 4200;\n\n    function show(name) {\n      tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === name));\n      views.forEach(v => v.classList.toggle('active', v.dataset.tab === name));\n      // restart progress bar animation on the active tab\n      tabs.forEach(t => {\n        if (t.dataset.tab === name) {\n          t.classList.remove('ticking');\n          // reflow then add\n          void t.offsetWidth;\n          if (timer) t.classList.add('ticking');\n        } else {\n          t.classList.remove('ticking');\n        }\n      });\n    }\n    function next() {\n      idx = (idx + 1) % order.length;\n      show(order[idx]);\n    }\n    function startAuto() {\n      stopAuto();\n      timer = setInterval(next, INTERVAL);\n      // mark current as ticking\n      const active = document.querySelector('.tui-tab.active');\n      if (active) {\n        active.classList.remove('ticking');\n        void active.offsetWidth;\n        active.classList.add('ticking');\n      }\n    }\n    function stopAuto() {\n      if (timer) { clearInterval(timer); timer = null; }\n      tabs.forEach(t => t.classList.remove('ticking'));\n    }\n\n    // Hover an item: pause and show it\n    tabs.forEach((btn, i) => {\n      btn.addEventListener('mouseenter', () => {\n        stopAuto();\n        idx = i;\n        show(btn.dataset.tab);\n      });\n    });\n    // Leave the rail entirely: resume\n    if (rail) {\n      rail.addEventListener('mouseleave', () => {\n        startAuto();\n      });\n    }\n\n    // Pause when page is hidden (saves CPU on a background tab)\n    document.addEventListener('visibilitychange', () => {\n      if (document.hidden) stopAuto();\n    });\n\n    // Auto-play only when the mouse is inside the TUI section\n    const tuiWrap = document.querySelector('.tui-wrap');\n    if (tuiWrap) {\n      tuiWrap.addEventListener('mouseenter', () => {\n        // start cycling — unless the cursor is already parked on a tab\n        if (!tuiWrap.querySelector('.tui-tab:hover')) startAuto();\n      });\n      tuiWrap.addEventListener('mouseleave', () => {\n        stopAuto();\n      });\n    }\n  })();\n\n  // Copy button\n  document.querySelectorAll('.install button').forEach(btn => {\n    btn.addEventListener('click', async () => {\n      try {\n        await navigator.clipboard.writeText(btn.dataset.copy);\n        const orig = btn.textContent;\n        btn.textContent = 'copied';\n        btn.classList.add('copied');\n        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1200);\n      } catch (e) {}\n    });\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
